<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="theme-color" content="#1a5f4a">
    <meta name="description" content="EcoMaintenance - Professional Environmental Management Platform">
    <title>EcoMaintenance | Environmental Management</title>
    
    <!-- ============================================================
    CORE LIBRARIES
    ============================================================ -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    <script src="https://unpkg.com/turf@6.5.0/turf.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <!-- PDF Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- ============================================================
    STYLES
    ============================================================ -->
    <style>
        /* ----- RESET & ROOT VARIABLES ----- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a5f4a;
            --primary-dark: #0e3d2f;
            --primary-light: #2d8a6e;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--gray-100); height: 100vh; overflow: hidden; }
        
        /* ----- APP LAYOUT ----- */
        .app { display: flex; height: 100vh; width: 100%; overflow: hidden; }
        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #0a241f 0%, #0a1f1a 100%);
            color: #e8f0ed;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 200;
            box-shadow: 2px 0 12px rgba(0,0,0,0.1);
        }
        .sidebar-header { padding: 20px 18px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .sidebar-header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.3px; }
        .sidebar-header h1 i { color: #7abf9e; margin-right: 8px; }
        .version { font-size: 0.65rem; opacity: 0.6; margin-top: 4px; }
        .nav-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-left: 3px solid transparent;
            margin: 2px 8px;
            border-radius: 10px;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .nav-item:hover { background: rgba(122,191,158,0.12); }
        .nav-item.active { background: rgba(122,191,158,0.18); border-left-color: #7abf9e; }
        .nav-item i { width: 22px; font-size: 1rem; }
        
        /* ----- MAIN CONTENT ----- */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .toolbar {
            background: white;
            padding: 10px 18px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 1px solid var(--gray-200);
            z-index: 150;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        }
        .map-container { flex: 1; position: relative; min-height: 0; }
        #map { height: 100%; width: 100%; position: absolute; top: 0; left: 0; }
        
        /* ----- BUTTONS ----- */
        .btn {
            padding: 8px 16px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-secondary { background: var(--gray-100); color: var(--gray-800); border: 1px solid var(--gray-200); }
        .btn-secondary:hover { background: var(--gray-200); }
        .btn-danger { background: #dc2626; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-sm { padding: 4px 12px; font-size: 0.7rem; }
        
        /* ----- PANEL (SLIDEOUT) ----- */
        .panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 600px;
            max-width: 92vw;
            height: 100vh;
            background: white;
            box-shadow: -8px 0 32px rgba(0,0,0,0.12);
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel.open { transform: translateX(0); }
        .panel-header { padding: 16px 22px; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; background: white; }
        .panel-content { padding: 18px 22px; flex: 1; overflow-y: auto; }
        
        /* ----- FORM ELEMENTS ----- */
        .form-section { margin-bottom: 16px; border: 1px solid var(--gray-200); border-radius: 14px; overflow: hidden; background: white; }
        .section-header { background: var(--gray-50); padding: 14px 16px; font-weight: 700; font-size: 0.8rem; color: var(--primary); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .section-content { padding: 16px; border-top: 1px solid var(--gray-200); }
        .section-content.collapsed { display: none; }
        .form-group { margin-bottom: 14px; }
        label { display: block; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--gray-700); margin-bottom: 4px; letter-spacing: 0.3px; }
        input, select, textarea { width: 100%; padding: 10px 12px; border: 1.5px solid var(--gray-200); border-radius: 10px; font-size: 0.85rem; font-family: inherit; transition: all 0.2s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,95,74,0.08); }
        
        /* ----- PHOTO GALLERY ----- */
        .photo-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; max-height: 260px; overflow-y: auto; }
        .photo-item { position: relative; width: 90px; height: 90px; border-radius: 12px; overflow: hidden; border: 2px solid var(--gray-200); cursor: pointer; background: var(--gray-100); }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        .remove-photo { position: absolute; top: 4px; right: 4px; background: rgba(220,38,38,0.9); color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; font-weight: bold; }
        .photo-meta { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6); color: white; font-size: 8px; padding: 2px 6px; text-align: center; }
        
        /* ----- MAP OVERLAYS ----- */
        .status-badge { position: absolute; bottom: 16px; right: 16px; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); color: white; padding: 6px 14px; border-radius: 30px; font-size: 11px; z-index: 100; pointer-events: none; font-weight: 500; }
        .draw-info { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); color: white; padding: 6px 16px; border-radius: 30px; font-size: 11px; z-index: 100; display: flex; gap: 14px; font-weight: 500; white-space: nowrap; pointer-events: none; }
        .layer-toggle { position: absolute; top: 80px; right: 12px; background: white; border-radius: 12px; padding: 6px; box-shadow: var(--shadow-md); z-index: 200; min-width: 110px; }
        .layer-item { padding: 6px 10px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 8px; border-radius: 8px; transition: background 0.15s; }
        .layer-item:hover { background: var(--gray-100); }
        .locate-btn { position: absolute; bottom: 80px; right: 12px; background: white; border-radius: 40px; padding: 10px 14px; box-shadow: var(--shadow-md); z-index: 200; cursor: pointer; border: none; font-size: 13px; font-weight: 600; color: var(--primary); transition: all 0.2s; }
        .locate-btn:hover { background: var(--gray-100); transform: scale(1.02); }
        
        /* ----- NOTIFICATIONS ----- */
        .notification { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--gray-800); color: white; padding: 12px 26px; border-radius: 40px; z-index: 2000; animation: fadeOut 3s forwards; font-size: 13px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); font-weight: 500; }
        @keyframes fadeOut { 0% { opacity: 0; transform: translateX(-50%) translateY(16px); } 15% { opacity: 1; transform: translateX(-50%) translateY(0); } 80% { opacity: 1; } 100% { opacity: 0; transform: translateX(-50%) translateY(-16px); visibility: hidden; } }
        
        /* ----- CARDS ----- */
        .inspection-card { border: 1px solid var(--gray-200); border-radius: 14px; padding: 14px; margin-bottom: 12px; background: white; cursor: pointer; transition: all 0.2s; }
        .inspection-card:hover { border-color: var(--primary); box-shadow: var(--shadow-md); transform: translateY(-2px); }
        .health-meter { background: var(--gray-200); border-radius: 20px; height: 6px; overflow: hidden; margin: 8px 0; }
        .health-fill { height: 100%; background: linear-gradient(90deg, #dc2626, #f59e0b, #10b981); width: 0%; border-radius: 20px; transition: width 0.3s; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 30px; font-size: 0.65rem; font-weight: 700; }
        .badge-good { background: #10b981; color: white; }
        .badge-mod { background: #f59e0b; color: white; }
        .badge-poor { background: #dc2626; color: white; }
        .storage-info { position: fixed; bottom: 16px; left: 16px; background: rgba(0,0,0,0.65); color: white; padding: 4px 12px; border-radius: 16px; font-size: 9px; z-index: 100; font-family: monospace; }
        
        /* ----- RESPONSIVE ----- */
        @media (max-width: 768px) { .sidebar { width: 64px; } .sidebar-header h1, .nav-item span, .version { display: none; } .nav-item { justify-content: center; padding: 14px 0; margin: 2px 0; } .toolbar .btn span { display: none; } .btn { padding: 8px 12px; } .draw-info { font-size: 9px; gap: 6px; } }
        @media (prefers-color-scheme: dark) { .panel, .toolbar, .form-section, .inspection-card, .layer-toggle { background: var(--gray-800); color: var(--gray-100); border-color: var(--gray-700); } .section-header { background: var(--gray-800); color: #7abf9e; } input, select, textarea { background: var(--gray-700); border-color: var(--gray-600); color: var(--gray-100); } .panel-header { background: var(--gray-800); border-color: var(--gray-700); } }
    </style>
</head>

<!-- ============================================================
APP STRUCTURE
============================================================ -->
<div class="app">
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header"><h1><i class="fas fa-leaf"></i> EcoMaintain</h1><div class="version">v3.0 | Professional</div></div>
        <div class="nav-item active" data-view="dashboard"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></div>

    <!-- MAIN CONTENT -->
    <div class="main">
        <div class="toolbar">

                <button id="clearMapBtn" class="btn btn-secondary"><i class="fas fa-trash-alt"></i><span> Clear</span></button>
                <button id="exportGeoJsonBtn" class="btn btn-secondary"><i class="fas fa-download"></i><span> GeoJSON</span></button>
                <button id="exportCSVBtn" class="btn btn-secondary"><i class="fas fa-file-csv"></i><span> CSV</span></button>

<!-- ============================================================
JAVASCRIPT - APPLICATION LOGIC
============================================================ -->
<script>
// ================================================================
// SECTION 1: MAIN APPLICATION CLASS
// ================================================================
class EcoMaintenance {
    
    // --------------------------------------------------------------
    // 1.1 CONSTRUCTOR - Initialise application state
    // --------------------------------------------------------------
    constructor() {
        this.state = {
            map: null,
            drawnItems: null,
            db: null,
            dbReady: false,
            currentId: null,
            currentPhotos: [],
            currentLat: -42.8806,
            currentLng: 147.3250,
            geometry: [],
            waypoints: [],
            species: [],
            isFinalised: false,
            currentInspection: null,
            currentBaseLayer: null,
            satLayer: null,
            topoLayer: null,
            measuring: false,
            measurePoints: [],
            measureLine: null,
            measureMarkers: []
        };
        
        this.tasmanianVegetationTypes = [
            'Dry Eucalypt Forest', 'Wet Eucalypt Forest', 'Rainforest',
            'Moorland', 'Grassland', 'Coastal Heath', 'Saltmarsh',
            'Alpine Vegetation', 'Riparian Forest', 'Plantation'
        ];
        
        this.threatenedSpecies = [
            'Tasmanian Devil', 'Eastern Quoll', 'Spotted-tailed Quoll',
            'Wedge-tailed Eagle', 'Swift Parrot', 'Giant Freshwater Lobster',
            'Galaxias', 'Tasmanian Tree Fern', 'King Billy Pine'
        ];
    }

    // --------------------------------------------------------------
    // 1.2 INITIALISATION
    // --------------------------------------------------------------
    async init() {
        await this.initDB();
        this.initMap();
        this.initGPS();
        this.bindEvents();
        this.updateStorageStatus();
        this.showNotification('EcoMaintenance v3.0 Ready', 'success');
    }

    // --------------------------------------------------------------
    // SECTION 2: DATABASE OPERATIONS (IndexedDB with localStorage fallback)
    // --------------------------------------------------------------
    async initDB() {
        return new Promise((resolve) => {
            const req = indexedDB.open('EcoMaintenance_v3', 3);
            req.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('inspections')) {
                    const s = db.createObjectStore('inspections', { keyPath: 'id' });
                    s.createIndex('dateTime', 'dateTime');
                    s.createIndex('status', 'status');
                    s.createIndex('siteName', 'siteName');
                }
                if (!db.objectStoreNames.contains('drafts')) {
                    db.createObjectStore('drafts', { keyPath: 'id' });
                }
            };
            req.onsuccess = (e) => {
                this.state.db = e.target.result;
                this.state.dbReady = true;
                resolve();
            };
            req.onerror = () => {
                console.warn('IndexedDB fallback to localStorage');
                resolve();
            };
        });
    }

    async saveInspection(data, isDraft = false) {
        if (!this.state.dbReady) {
            localStorage.setItem(`${isDraft ? 'draft_' : 'insp_'}${data.id}`, JSON.stringify(data));
            return;
        }
        const store = isDraft ? 'drafts' : 'inspections';
        this.state.db.transaction([store], 'readwrite').objectStore(store).put(data);
        this.updateStorageStatus();
    }

    async getAllInspections() {
        if (!this.state.dbReady) {
            return Object.keys(localStorage)
                .filter(k => k.startsWith('insp_'))
                .map(k => JSON.parse(localStorage.getItem(k)));
        }
        return new Promise(resolve => {
            this.state.db.transaction(['inspections'], 'readonly')
                .objectStore('inspections')
                .getAll()
                .onsuccess = e => resolve(e.target.result || []);
        });
    }

    async getAllDrafts() {
        if (!this.state.dbReady) {
            return Object.keys(localStorage)
                .filter(k => k.startsWith('draft_'))
                .map(k => JSON.parse(localStorage.getItem(k)));
        }
        return new Promise(resolve => {
            this.state.db.transaction(['drafts'], 'readonly')
                .objectStore('drafts')
                .getAll()
                .onsuccess = e => resolve(e.target.result || []);
        });
    }

    async getInspection(id, isDraft = false) {
        if (!this.state.dbReady) {
            return JSON.parse(localStorage.getItem(`${isDraft ? 'draft_' : 'insp_'}${id}`));
        }
        return new Promise(resolve => {
            this.state.db.transaction([isDraft ? 'drafts' : 'inspections'], 'readonly')
                .objectStore(isDraft ? 'drafts' : 'inspections')
                .get(id)
                .onsuccess = e => resolve(e.target.result);
        });
    }

    async deleteInspection(id, isDraft = false) {
        if (!this.state.dbReady) {
            localStorage.removeItem(`${isDraft ? 'draft_' : 'insp_'}${id}`);
            return;
        }
        this.state.db.transaction([isDraft ? 'drafts' : 'inspections'], 'readwrite')
            .objectStore(isDraft ? 'drafts' : 'inspections')
            .delete(id);
        this.updateStorageStatus();
    }

    async updateStorageStatus() {
        if (!this.state.dbReady) {
            document.getElementById('storageStatus').innerHTML = '<i class="fas fa-database"></i> Local';
            return;
        }
        const insp = await this.getAllInspections();
        const drafts = await this.getAllDrafts();
        document.getElementById('storageStatus').innerHTML = 
            `<i class="fas fa-database"></i> ${insp.length} Reports | ${drafts.length} Drafts`;
    }

    // --------------------------------------------------------------
    // SECTION 3: ECOLOGICAL SCORING ENGINE
    // --------------------------------------------------------------
    calculateEcologicalScore(data) {
        const vh = parseFloat(data.vegHealth || 6);
        const sr = parseFloat(data.speciesRichness || 5);
        const wc = parseFloat(data.weedCover || 30);
        const hq = parseFloat(data.habitatQuality || 5);
        const dist = parseFloat(data.disturbance || 3);
        const regen = parseFloat(data.regeneration || 5);
        
        const score = Math.min(10, Math.max(0, 
            (vh * 0.25) + (sr * 0.2) + ((100 - wc) / 10 * 0.2) + 
            (hq * 0.15) + ((10 - dist) * 0.1) + (regen * 0.1)
        ));
        
        let risk = 'Low Risk';
        let priority = 'Routine Monitoring';
        if (score < 3) { risk = 'Critical'; priority = 'Immediate Intervention'; }
        else if (score < 5) { risk = 'High Risk'; priority = 'Urgent Management'; }
        else if (score < 7) { risk = 'Medium Risk'; priority = 'Short-term Plan'; }
        else if (score < 8.5) { risk = 'Low Risk'; priority = 'Regular Monitoring'; }
        else { risk = 'Excellent'; priority = 'Maintenance Only'; }
        
        return {
            conditionScore: parseFloat(score.toFixed(1)),
            riskRating: risk,
            managementPriority: priority,
            tasmanianSignificance: score > 7 ? 'High Conservation Value' : 
                                  (score > 5 ? 'Moderate Conservation Value' : 'Low Conservation Value')
        };
    }

    // --------------------------------------------------------------
    // SECTION 4: PHOTO HANDLING
    // --------------------------------------------------------------
    async compressImage(dataURL, maxWidth = 800) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                if (w > maxWidth) { h = (h * maxWidth) / w; w = maxWidth; }
                canvas.width = w; canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/jpeg', 0.8));
            };
            img.src = dataURL;
        });
    }

    async handlePhotos(files) {
        for (const file of Array.from(files)) {
            const reader = new FileReader();
            await new Promise((resolve) => {
                reader.onload = async (e) => {
                    const compressed = await this.compressImage(e.target.result, 800);
                    this.state.currentPhotos.push({
                        id: this.uuid(),
                        dataURL: compressed,
                        timestamp: new Date().toISOString(),
                        lat: this.state.currentLat,
                        lng: this.state.currentLng,
                        caption: ''
                    });
                    resolve();
                };
                reader.readAsDataURL(file);
            });
        }
        this.renderGallery();
        this.showNotification(`${files.length} photo(s) added`, 'success');
    }

    renderGallery() {
        const g = document.getElementById('photoGallery');
        if (!g) return;
        if (this.state.currentPhotos.length === 0) {
            g.innerHTML = '<div style="padding:20px;text-align:center;color:#94a3b8;"><i class="fas fa-camera"></i> No photos</div>';
            return;
        }
        g.innerHTML = this.state.currentPhotos.map((p, idx) => `
            <div class="photo-item">
                <img src="${p.dataURL}" alt="Field photo">
                <div class="photo-meta">${new Date(p.timestamp).toLocaleTimeString()}</div>
                <div class="remove-photo" data-idx="${idx}">×</div>
            </div>
        `).join('');
        document.querySelectorAll('.remove-photo').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const idx = parseInt(el.dataset.idx);
                this.state.currentPhotos.splice(idx, 1);
                this.renderGallery();
            });
        });
    }

    // --------------------------------------------------------------
    // SECTION 5: MAP INITIALISATION & CONTROLS
    // --------------------------------------------------------------
    initMap() {
        this.state.map = L.map('map').setView([-42.8806, 147.3250], 10);
        
        this.state.currentBaseLayer = L.tileLayer(
            'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
            { attribution: '&copy; OSM' }
        ).addTo(this.state.map);
        
        this.state.satLayer = L.tileLayer(
            'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
            { attribution: '&copy; Esri' }
        );
        
        this.state.topoLayer = L.tileLayer(
            'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
            { attribution: '&copy; OpenTopoMap' }
        );
        
        this.state.drawnItems = L.featureGroup().addTo(this.state.map);
        
        const drawControl = new L.Control.Draw({
            position: 'topleft',
            draw: {
                polygon: { shapeOptions: { color: '#1a5f4a', weight: 3 }, showArea: true },
                rectangle: true,
                marker: true,
                circle: false,
                polyline: false
            },
            edit: { featureGroup: this.state.drawnItems, remove: true }
        });
        this.state.map.addControl(drawControl);
        
        this.state.map.on(L.Draw.Event.CREATED, (e) => {
            const layer = e.layer;
            const geojson = layer.toGeoJSON();
            this.state.geometry.push(geojson);
            this.state.drawnItems.addLayer(layer);
            if (e.layerType === 'polygon') {
                const area = turf.area(geojson) / 10000;
                this.showNotification(`Polygon: ${area.toFixed(2)} ha`, 'success');
            } else if (e.layerType === 'marker') {
                this.state.waypoints.push({
                    id: this.uuid(),
                    lat: layer.getLatLng().lat,
                    lng: layer.getLatLng().lng,
                    label: `WP${this.state.waypoints.length + 1}`
                });
                this.showNotification('Waypoint added', 'success');
            }
        });
        
        this.state.map.on('click', (e) => {
            this.state.currentLat = e.latlng.lat;
            this.state.currentLng = e.latlng.lng;
        });
        
        // Layer toggle controls
        const toggleDiv = document.createElement('div');
        toggleDiv.className = 'layer-toggle';
        toggleDiv.innerHTML = `
            <div class="layer-item" id="toggleLight"><i class="fas fa-map"></i> Streets</div>
            <div class="layer-item" id="toggleSatMap"><i class="fas fa-satellite"></i> Satellite</div>
            <div class="layer-item" id="toggleTopo"><i class="fas fa-mountain"></i> Topo</div>
        `;
        document.querySelector('.map-container').appendChild(toggleDiv);
        
        // Locate button
        const locateBtn = document.createElement('button');
        locateBtn.className = 'locate-btn';
        locateBtn.innerHTML = '<i class="fas fa-location-arrow"></i> My Location';
        document.querySelector('.map-container').appendChild(locateBtn);
        locateBtn.addEventListener('click', () => this.locateUser());
        
        // Layer toggle event handlers
        document.getElementById('toggleLight').onclick = () => {
            if (this.state.satLayer && this.state.map.hasLayer(this.state.satLayer)) 
                this.state.map.removeLayer(this.state.satLayer);
            if (this.state.topoLayer && this.state.map.hasLayer(this.state.topoLayer)) 
                this.state.map.removeLayer(this.state.topoLayer);
            if (!this.state.map.hasLayer(this.state.currentBaseLayer)) 
                this.state.currentBaseLayer.addTo(this.state.map);
        };
        document.getElementById('toggleSatMap').onclick = () => {
            if (this.state.currentBaseLayer && this.state.map.hasLayer(this.state.currentBaseLayer)) 
                this.state.map.removeLayer(this.state.currentBaseLayer);
            if (this.state.topoLayer && this.state.map.hasLayer(this.state.topoLayer)) 
                this.state.map.removeLayer(this.state.topoLayer);
            if (!this.state.map.hasLayer(this.state.satLayer)) 
                this.state.satLayer.addTo(this.state.map);
        };
        document.getElementById('toggleTopo').onclick = () => {
            if (this.state.currentBaseLayer && this.state.map.hasLayer(this.state.currentBaseLayer)) 
                this.state.map.removeLayer(this.state.currentBaseLayer);
            if (this.state.satLayer && this.state.map.hasLayer(this.state.satLayer)) 
                this.state.map.removeLayer(this.state.satLayer);
            if (!this.state.map.hasLayer(this.state.topoLayer)) 
                this.state.topoLayer.addTo(this.state.map);
        };
    }

    locateUser() {
        if (!navigator.geolocation) {
            this.showNotification('Geolocation not supported', 'warning');
            return;
        }
        navigator.geolocation.getCurrentPosition(
            pos => {
                this.state.map.setView([pos.coords.latitude, pos.coords.longitude], 16);
                this.state.currentLat = pos.coords.latitude;
                this.state.currentLng = pos.coords.longitude;
                this.showNotification('Location found', 'success');
            },
            () => this.showNotification('Location unavailable', 'warning'),
            { enableHighAccuracy: true, timeout: 8000 }
        );
    }

    initGPS() {
        if (!navigator.geolocation) {
            document.getElementById('gpsStatus').innerHTML = '<i class="fas fa-exclamation-triangle"></i> GPS unavailable';
            return;
        }
        let marker = null;
        navigator.geolocation.watchPosition(
            pos => {
                this.state.currentLat = pos.coords.latitude;
                this.state.currentLng = pos.coords.longitude;
                document.getElementById('gpsStatus').innerHTML = 
                    `<i class="fas fa-check-circle"></i> GPS: ±${Math.round(pos.coords.accuracy)}m`;
                if (!marker) {
                    marker = L.marker([this.state.currentLat, this.state.currentLng], {
                        icon: L.divIcon({
                            html: '<i class="fas fa-location-dot" style="color:#dc2626;font-size:20px;"></i>',
                            iconSize: [20, 20]
                        })
                    }).addTo(this.state.map);
                } else {
                    marker.setLatLng([this.state.currentLat, this.state.currentLng]);
                }
            },
            () => document.getElementById('gpsStatus').innerHTML = '<i class="fas fa-exclamation"></i> GPS error',
            { enableHighAccuracy: true }
        );
    }

    // --------------------------------------------------------------
    // SECTION 6: MEASUREMENT TOOL
    // --------------------------------------------------------------
    startMeasure() {
        if (this.state.measuring) {
            this.state.measuring = false;
            if (this.state.measureLine) {
                this.state.map.removeLayer(this.state.measureLine);
                this.state.measureLine = null;
            }
            this.state.measureMarkers.forEach(m => this.state.map.removeLayer(m));
            this.state.measureMarkers = [];
            this.state.measurePoints = [];
            this.state.map.off('click', this.measureClickHandler);
            this.showNotification('Measure OFF', 'info');
            return;
        }
        this.state.measuring = true;
        this.state.measurePoints = [];
        this.showNotification('Measure ON - Click two points', 'info');
        
        this.measureClickHandler = (e) => {
            if (!this.state.measuring) return;
            const latlng = e.latlng;
            this.state.measurePoints.push(latlng);
            
            const marker = L.marker(latlng, {
                icon: L.divIcon({
                    html: `<div style="background:#f59e0b;color:white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:bold;border:2px solid white;font-size:11px;">${this.state.measurePoints.length}</div>`,
                    iconSize: [22, 22]
                })
            }).addTo(this.state.map);
            this.state.measureMarkers.push(marker);
            
            if (this.state.measurePoints.length === 2) {
                const p1 = this.state.measurePoints[0];
                const p2 = this.state.measurePoints[1];
                const R = 6371;
                const dLat = (p2.lat - p1.lat) * Math.PI / 180;
                const dLon = (p2.lng - p1.lng) * Math.PI / 180;
                const a = Math.sin(dLat/2)**2 + 
                          Math.cos(p1.lat * Math.PI/180) * Math.cos(p2.lat * Math.PI/180) * 
                          Math.sin(dLon/2)**2;
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                const distKm = R * c;
                const distM = distKm * 1000;
                const text = distKm >= 1 ? `${distKm.toFixed(3)} km` : `${distM.toFixed(1)} m`;
                
                if (this.state.measureLine) this.state.map.removeLayer(this.state.measureLine);
                this.state.measureLine = L.polyline(this.state.measurePoints, {
                    color: '#f59e0b',
                    weight: 4,
                    dashArray: '6,6'
                }).addTo(this.state.map);
                
                const mid = L.latLng((p1.lat + p2.lat)/2, (p1.lng + p2.lng)/2);
                const label = L.divIcon({
                    html: `<div style="background:#1a5f4a;color:white;padding:3px 10px;border-radius:16px;font-size:11px;font-weight:bold;">📏 ${text}</div>`,
                    iconSize: [null, null]
                });
                this.state.measureMarkers.push(L.marker(mid, { icon: label }).addTo(this.state.map));
                this.showNotification(`Distance: ${text}`, 'success');
                
                setTimeout(() => {
                    if (this.state.measuring) {
                        this.state.measuring = false;
                        this.state.map.off('click', this.measureClickHandler);
                        this.showNotification('Measure OFF', 'info');
                    }
                }, 1800);
            }
        };
        this.state.map.on('click', this.measureClickHandler);
    }

    // --------------------------------------------------------------
    // SECTION 7: UTILITY FUNCTIONS
    // --------------------------------------------------------------
    uuid() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
            const r = Math.random() * 16 | 0;
            const v = c === 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    showNotification(msg, type = 'success') {
        const n = document.createElement('div');
        n.className = 'notification';
        const icon = type === 'success' ? 'fa-check-circle' : 
                     (type === 'warning' ? 'fa-exclamation-triangle' : 'fa-info-circle');
        n.innerHTML = `<i class="fas ${icon}"></i> ${msg}`;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 2800);
    }

    escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    }

    bindFormEvents() {
        const photoInput = document.getElementById('photoInput');
        if (photoInput) photoInput.onchange = (e) => this.handlePhotos(e.target.files);
        this.renderGallery();
        
        document.getElementById('saveDraftBtn').onclick = async () => {
            const data = this.collectFormData();
            await this.saveInspection(data, true);
            this.showNotification('Draft saved', 'success');
            this.updateStorageStatus();
        };
        
        document.getElementById('finaliseBtn').onclick = async () => {
            const data = this.collectFormData();
            if (!data.siteName) {
                this.showNotification('Site name required', 'warning');
                return;
            }
            data.status = 'finalised';
            this.state.isFinalised = true;
            const eco = this.calculateEcologicalScore(data);
            data.ecologicalScore = eco;
            await this.saveInspection(data, false);
            await this.generateProfessionalPDF(data);
            await this.deleteInspection(data.id, true);
            this.showNotification('Report generated', 'success');
            this.closePanel();
            this.showInspections();
            this.updateStorageStatus();
        };
        
        document.getElementById('cancelBtn').onclick = () => this.closePanel();
        
        document.querySelectorAll('.section-header').forEach(h => {
            h.addEventListener('click', () => {
                h.classList.toggle('collapsed');
                h.nextElementSibling.classList.toggle('collapsed');
            });
        });
        
        ['vegHealth', 'speciesRichness', 'regeneration', 'weedCover', 'habitatQuality', 'disturbance'].forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.oninput = () => {
                    const data = this.collectFormData();
                    const eco = this.calculateEcologicalScore(data);
                    const fill = document.querySelector('.health-fill');
                    if (fill) fill.style.width = `${eco.conditionScore * 10}%`;
                };
            }
        });
    }

    // ================================================================
    // SECTION 9: PROFESSIONAL PDF REPORT GENERATION
    // ================================================================
    async generateProfessionalPDF(inspection) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const pageWidth = 210, pageHeight = 297;
        const margin = 20, contentWidth = pageWidth - 2 * margin;
        let y = margin;
        const eco = inspection.ecologicalScore || this.calculateEcologicalScore(inspection);

        // --------------------------------------------------------------
        // 9.1 PDF HELPER FUNCTIONS
        // --------------------------------------------------------------
        const addLine = (x1, y1, x2, y2, color = '#1a5f4a', width = 0.5) => {
            doc.setDrawColor(color);
            doc.setLineWidth(width);
            doc.line(x1, y1, x2, y2);
        };

        const addTitle = (text, size = 16, color = '#1a5f4a', align = 'left') => {
            doc.setFontSize(size);
            doc.setTextColor(color);
            doc.text(text, margin, y, { align });
            y += size * 0.4;
        };

        const addBody = (text, size = 10, color = '#333333', align = 'left') => {
            doc.setFontSize(size);
            doc.setTextColor(color);
            const lines = doc.splitTextToSize(text, contentWidth);
            doc.text(lines, margin, y, { align });
            y += lines.length * (size * 0.45) + 2;
        };

        const addField = (label, value, size = 9) => {
            doc.setFontSize(size);
            doc.setTextColor('#1a5f4a');
            doc.text(label + ':', margin, y);
            doc.setTextColor('#333333');
            const valStr = value || 'Not recorded';
            const x = margin + doc.getTextWidth(label + ': ') + 2;
            doc.text(valStr, x, y);
            y += size * 0.5 + 1;
        };

        // --------------------------------------------------------------
        // 9.2 COVER PAGE
        // --------------------------------------------------------------
        // Top bar
        doc.setFillColor('#1a5f4a');
        doc.rect(0, 0, pageWidth, 10, 'F');
        y = 30;
        
        // Title
        doc.setFontSize(28);
        doc.setTextColor('#1a5f4a');
        doc.text('EcoMaintenance', margin, y);
        y += 12;
        doc.setFontSize(16);
        doc.setTextColor('#2d8a6e');
        doc.text('Environmental Assessment Report', margin, y);
        y += 12;
        addLine(margin, y, pageWidth - margin, y, '#1a5f4a', 1);
        y += 12;
        
        // Metadata
        doc.setFontSize(12);
        doc.setTextColor('#444');
        doc.text(`Report ID: ${inspection.id}`, margin, y);
        y += 8;
        doc.text(`Generated: ${new Date().toLocaleString()}`, margin, y);
        y += 8;
        doc.text(`Version: 3.0`, margin, y);
        y += 8;
        doc.text(`Author: ${inspection.inspector || 'Environmental Consultant'}`, margin, y);
        y += 8;
        doc.text(`Organization: ${inspection.organization || 'Not specified'}`, margin, y);
        y += 12;
        
        // Confidentiality
        doc.setFontSize(10);
        doc.setTextColor('#666');
        const conf = 'CONFIDENTIAL - This report contains sensitive environmental data. Distribution restricted to authorised personnel.';
        const confLines = doc.splitTextToSize(conf, contentWidth);
        doc.text(confLines, margin, y);
        y += confLines.length * 4.5 + 8;

        // --------------------------------------------------------------
        // 9.3 COVER PHOTO - Auto-capture from first uploaded image
        // --------------------------------------------------------------
        if (inspection.photos && inspection.photos.length > 0) {
            try {
                const imgData = inspection.photos[0].dataURL;
                const imgWidth = contentWidth;
                const imgHeight = 60;
                doc.addImage(imgData, 'JPEG', margin, y, imgWidth, imgHeight);
                
                // Add photo caption with timestamp
                doc.setFontSize(8);
                doc.setTextColor('#666');
                const photoDate = new Date(inspection.photos[0].timestamp);
                const caption = inspection.photos[0].caption || 
                    `Cover Photo: ${inspection.siteName} - ${photoDate.toLocaleDateString()} ${photoDate.toLocaleTimeString()}`;
                doc.text(caption, margin, y + imgHeight + 4);
                y += imgHeight + 12;
            } catch (e) {
                // Fallback if image fails to load
                doc.setDrawColor('#ccc');
                doc.setFillColor('#f5f5f5');
                doc.roundedRect(margin, y, contentWidth, 60, 4, 4, 'FD');
                doc.setFontSize(10);
                doc.setTextColor('#999');
                doc.text('Project Photograph (image unavailable)', margin + 10, y + 30);
                y += 70;
            }
        } else {
            // Placeholder if no photos available
            doc.setDrawColor('#ccc');
            doc.setFillColor('#f5f5f5');
            doc.roundedRect(margin, y, contentWidth, 60, 4, 4, 'FD');

    async exportToCSV() {
        const inspections = await this.getAllInspections();
        if (inspections.length === 0) {
            this.showNotification('No inspections', 'warning');
            return;
        }
        const csvData = inspections.map(i => ({
            'ID': i.id,
            'Site': i.siteName,
            'Inspector': i.inspector,
            'Date': i.dateTime,
            'Score': i.ecologicalScore?.conditionScore || '',
            'Risk': i.ecologicalScore?.riskRating || ''
        }));
        const ws = XLSX.utils.json_to_sheet(csvData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Inspections');
        XLSX.writeFile(wb, `EcoMaintenance_${new Date().toISOString().slice(0, 19)}.xlsx`);
        this.showNotification('Excel export complete', 'success');
    }

    async exportToJSON() {
        const inspections = await this.getAllInspections();
        const drafts = await this.getAllDrafts();
        const data = {
            exportDate: new Date().toISOString(),
            version: '3.0',
            inspections: inspections,
            drafts: drafts
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `EcoMaintenance_Data_${new Date().toISOString().slice(0, 19)}.json`;
        a.click();
        URL.revokeObjectURL(blob.url);
        this.showNotification('JSON export complete', 'success');
    }

    async importFromJSON(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    let imported = 0;
                    if (data.inspections) {
                        for (const insp of data.inspections) {
                            await this.saveInspection(insp, false);
                            imported++;
                        }
                    }
                    if (data.drafts) {
                        for (const draft of data.drafts) {
                            await this.saveInspection(draft, true);
                            imported++;
                        }
                    }
                    this.showNotification(`Imported ${imported} records`, 'success');
                    this.updateStorageStatus();
                    resolve();
                } catch (err) {
                    this.showNotification('Invalid JSON', 'warning');
                    reject(err);
                }
            };
            reader.readAsText(file);
        });
    }

    exportGeoJSON() {
        const features = [
            ...this.state.geometry,
            ...this.state.waypoints.map(w => turf.point([w.lng, w.lat], {
                label: w.label,
                type: 'waypoint'
            }))
        ];
        const fc = { type: 'FeatureCollection', features };
        const blob = new Blob([JSON.stringify(fc, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `EcoMaintenance_${Date.now()}.geojson`;
        a.click();
        URL.revokeObjectURL(blob.url);
        this.showNotification('GeoJSON exported', 'success');
    }

    // ================================================================
    // SECTION 11: UI NAVIGATION & PANEL MANAGEMENT
    // ================================================================
    openPanel() {
        document.getElementById('panel').classList.add('open');
    }

    closePanel() {
        document.getElementById('panel').classList.remove('open');
    }

    async newInspection() {
        this.state.currentId = this.uuid();
        this.state.currentPhotos = [];
        this.state.geometry = [];
        this.state.waypoints = [];
        this.state.species = [];
        this.state.isFinalised = false;
        if (this.state.drawnItems) this.state.drawnItems.clearLayers();
        document.getElementById('panelContent').innerHTML = this.renderForm({ id: this.state.currentId });
        document.getElementById('panelTitle').innerHTML = 'New Assessment';
        this.openPanel();
        this.bindFormEvents();
    }

    async loadInspection(insp, isDraft = false) {
        this.state.currentId = insp.id;
        this.state.currentPhotos = insp.photos || [];
        this.state.geometry = insp.geometry || [];
        this.state.waypoints = insp.waypoints || [];
        this.state.species = insp.species || [];
        this.state.isFinalised = insp.status === 'finalised';
        if (this.state.drawnItems && this.state.geometry.length) {
            this.state.geometry.forEach(g => {
                try { L.geoJSON(g).addTo(this.state.drawnItems); } catch (e) {}
            });
        }
        document.getElementById('panelContent').innerHTML = this.renderForm(insp);
        document.getElementById('panelTitle').innerHTML = isDraft ? 'Edit Draft' : 'View Inspection';
        this.openPanel();
        this.bindFormEvents();
        this.renderGallery();
    }

    async showInspections() {
        const inspections = await this.getAllInspections();
        this.openPanel();
        document.getElementById('panelTitle').innerHTML = 'Finalised Inspections';
        if (inspections.length === 0) {
            document.getElementById('panelContent').innerHTML = `
                <div style="text-align:center;padding:40px;">
                    <p><i class="fas fa-folder-open" style="font-size:40px;opacity:0.4;"></i></p>
                    <p>No finalised inspections</p>
                    <button id="startNew" class="btn btn-primary">Start New</button>
                </div>
            `;
            document.getElementById('startNew')?.addEventListener('click', () => this.newInspection());
            return;
        }
        let html = inspections.map(ins => `
            <div class="inspection-card">
                <strong><i class="fas fa-tree"></i> ${this.escapeHtml(ins.siteName)}</strong><br>
                <small>${ins.dateTime} | Score: ${ins.ecologicalScore?.conditionScore || ins.vegHealth || 0}/10 | ${ins.ecologicalScore?.riskRating || 'Not rated'}</small>
                <div style="display:flex;gap:6px;margin-top:10px;">
                    <button class="btn btn-secondary view-final" data-id="${ins.id}">View</button>
                    <button class="btn btn-primary pdf-final" data-id="${ins.id}">PDF Report</button>
                    <button class="btn btn-danger del-final" data-id="${ins.id}">Delete</button>
                </div>
            </div>
        `).join('');
        html += `<button id="viewDraftsBtn" class="btn btn-secondary" style="width:100%;margin-top:12px;"><i class="fas fa-save"></i> View Drafts</button>`;
        document.getElementById('panelContent').innerHTML = html;
        
        document.querySelectorAll('.view-final').forEach(btn => {
            btn.onclick = async () => {
                const insp = await this.getInspection(btn.dataset.id);
                if (insp) this.loadInspection(insp, false);
            };
        });
        document.querySelectorAll('.pdf-final').forEach(btn => {
            btn.onclick = async () => {
                const insp = await this.getInspection(btn.dataset.id);
                if (insp) this.generateProfessionalPDF(insp);
            };
        });
        document.querySelectorAll('.del-final').forEach(btn => {
            btn.onclick = async () => {
                if (confirm('Delete?')) {
                    await this.deleteInspection(btn.dataset.id, false);
                    this.showInspections();
                }
            };
        });
        document.getElementById('viewDraftsBtn').onclick = () => this.showDrafts();
    }

    async showDrafts() {
        const drafts = await this.getAllDrafts();
        this.openPanel();
        document.getElementById('panelTitle').innerHTML = 'Drafts';
        if (drafts.length === 0) {
            document.getElementById('panelContent').innerHTML = `
                <div style="text-align:center;padding:40px;">
                    <p>No drafts</p>
                    <button id="backToInsp" class="btn btn-secondary">Back</button>
                </div>
            `;
            document.getElementById('backToInsp')?.addEventListener('click', () => this.showInspections());
            return;
        }
        let html = drafts.map(d => `
            <div class="inspection-card">
                <strong><i class="fas fa-pen-fancy"></i> ${this.escapeHtml(d.siteName || 'Unnamed')}</strong><br>
                <small>Last edited: ${new Date(d.updatedAt).toLocaleString()}</small>
                <div style="display:flex;gap:6px;margin-top:10px;">
                    <button class="btn btn-secondary resume-draft" data-id="${d.id}">Resume</button>
                    <button class="btn btn-danger delete-draft" data-id="${d.id}">Delete</button>
                </div>
            </div>
        `).join('');
        html += `<button id="backToFinal" class="btn btn-secondary" style="width:100%;margin-top:12px;">Back to Finalised</button>`;
        document.getElementById('panelContent').innerHTML = html;
        
        document.querySelectorAll('.resume-draft').forEach(btn => {
            btn.onclick = async () => {
                const draft = await this.getInspection(btn.dataset.id, true);
                if (draft) this.loadInspection(draft, true);
            };
        });
        document.querySelectorAll('.delete-draft').forEach(btn => {
            btn.onclick = async () => {
                await this.deleteInspection(btn.dataset.id, true);
                this.showDrafts();
            };
        });
        document.getElementById('backToFinal').onclick = () => this.showInspections();
    }

                    <div style="background:#fee2e2;padding:16px;border-radius:12px;">
                        <div style="font-size:30px;font-weight:bold;">${crit}</div>
                        <div>Critical</div>
                    </div>
                </div>
                <button id="dashNew" class="btn btn-primary" style="width:100%;"><i class="fas fa-plus"></i> New Assessment</button>
                <button id="dashDrafts" class="btn btn-secondary" style="width:100%;margin-top:10px;"><i class="fas fa-save"></i> View Drafts</button>
            </div>
        `;
        document.getElementById('dashNew')?.addEventListener('click', () => this.newInspection());
        document.getElementById('dashDrafts')?.addEventListener('click', () => this.showDrafts());
    }

    async showDataManager() {
        this.openPanel();
        document.getElementById('panelTitle').innerHTML = 'Data Manager';
        document.getElementById('panelContent').innerHTML = `
            <div style="padding:16px;">
                <h3><i class="fas fa-download"></i> Export</h3>
                <button id="exportCSVData" class="btn btn-primary" style="width:100%;margin-bottom:8px;">
                    <i class="fas fa-file-excel"></i> Export Excel
                </button>
                <button id="exportJSONData" class="btn btn-secondary" style="width:100%;margin-bottom:16px;">
                    <i class="fas fa-code"></i> Export JSON
                </button>
                <h3><i class="fas fa-upload"></i> Import</h3>
                <input type="file" id="importJSONFile" accept=".json" style="margin-bottom:8px;">
                <button id="importJSONBtn" class="btn btn-secondary" style="width:100%;">
                    <i class="fas fa-upload"></i> Import JSON
                </button>
                <hr style="margin:16px 0;">
                <button id="clearAllData" class="btn btn-danger" style="width:100%;">
                    <i class="fas fa-trash"></i> Clear All Data
                </button>
            </div>
        `;
        document.getElementById('exportCSVData')?.addEventListener('click', () => this.exportToCSV());
        document.getElementById('exportJSONData')?.addEventListener('click', () => this.exportToJSON());
        document.getElementById('importJSONBtn')?.addEventListener('click', () => {
            const file = document.getElementById('importJSONFile').files[0];
            if (file) this.importFromJSON(file);
            else this.showNotification('Select a JSON file', 'warning');
        });
        document.getElementById('clearAllData')?.addEventListener('click', async () => {
            if (confirm('Delete ALL data? This cannot be undone.')) {
                const insp = await this.getAllInspections();
                const drafts = await this.getAllDrafts();
                for (const i of insp) await this.deleteInspection(i.id, false);
                for (const d of drafts) await this.deleteInspection(d.id, true);
                this.showNotification('All data cleared', 'success');
                this.updateStorageStatus();
                this.showDashboard();
            }
        });
    }

    // ================================================================
    // SECTION 12: EVENT BINDING
    // ================================================================
    bindEvents() {
        document.getElementById('newInspectionBtn').onclick = () => this.newInspection();
        document.getElementById('listInspectionsBtn').onclick = () => this.showInspections();
        document.getElementById('closePanelBtn').onclick = () => this.closePanel();
        document.getElementById('clearMapBtn').onclick = () => {
            this.state.drawnItems?.clearLayers();
            this.state.geometry = [];
            this.state.waypoints = [];
            this.showNotification('Map cleared', 'info');
        };
        document.getElementById('exportGeoJsonBtn').onclick = () => this.exportGeoJSON();
        document.getElementById('exportCSVBtn').onclick = () => this.exportToCSV();
        document.getElementById('measureBtn').onclick = () => this.startMeasure();
        document.getElementById('toggleSatBtn').onclick = () => document.getElementById('toggleSatMap')?.click();
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.onclick = () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                const view = item.dataset.view;
                if (view === 'dashboard') this.showDashboard();
                else if (view === 'inspections') this.showInspections();
                else if (view === 'new') this.newInspection();
                else if (view === 'mapview') this.closePanel();
                else if (view === 'drafts') this.showDrafts();
                else if (view === 'data') this.showDataManager();
            };
        });
    }
}

// ================================================================
// SECTION 13: INITIALISE APPLICATION
// ================================================================
const app = new EcoMaintenance();
app.init();
</script>
</body>
</html>
