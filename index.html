    async exportCSV() {
        const inspections = await this.db.getAll('inspections');
        if (inspections.length === 0) {
            Toast.warning('No data to export');
            return;
        }
        
        const data = inspections.map(i => ({
            'ID': i.id,
            'Site': i.siteName,
            'Inspector': i.inspector,
            'Organization': i.organization,
            'Date': i.dateTime,
            'Score': i.ecologicalScore?.conditionScore || '',
            'Risk': i.ecologicalScore?.riskRating || '',
            'Vegetation': i.vegetationType || '',
            'Weed Cover': i.weedCover || '',
            'Threat Level': i.threatLevel || '',
            'Priority': i.ecologicalScore?.managementPriority || ''
        }));
        
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Inspections');
        XLSX.writeFile(wb, `EcoMaintenance_${new Date().toISOString().slice(0,10)}.xlsx`);
        Toast.success('Excel export complete');
    }
    
    async exportJSON() {
        const inspections = await this.db.getAll('inspections');
        const drafts = await this.db.getAll('drafts');
        const data = {
            exportDate: new Date().toISOString(),
            version: CONFIG.version,
            app: CONFIG.appName,
            inspections: inspections,
            drafts: drafts
        };
        
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `EcoMaintenance_Data_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        Toast.success('JSON export complete');
    }
    
    exportGeoJSON() {
        const features = [
            ...this.mapService.getGeometry(),
            ...this.mapService.getWaypoints().map(w => ({
                type: 'Feature',
                geometry: { type: 'Point', coordinates: [w.lng, w.lat] },
                properties: { label: w.label, type: 'waypoint' }
            }))
        ];
        
        const fc = { type: 'FeatureCollection', features };
        const blob = new Blob([JSON.stringify(fc, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `EcoMaintenance_Map_${Date.now()}.geojson`;
        a.click();
        URL.revokeObjectURL(url);
        Toast.success('GeoJSON exported');
    }
    
    async importJSON() {
        const file = document.getElementById('importFile')?.files[0];
        if (!file) {
            Toast.warning('Select a JSON file');
            return;
        }
        
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const data = JSON.parse(e.target.result);
                let imported = 0;
                
                if (data.inspections) {
                    for (const insp of data.inspections) {
                        await this.db.save(insp, false);
                        imported++;
                    }
                }
                if (data.drafts) {
                    for (const draft of data.drafts) {
                        await this.db.save(draft, true);
                        imported++;
                    }
                }
                
                Toast.success(`Imported ${imported} records`);
                this.updateStorageStatus();
                this.showDataManager();
            } catch (err) {
                Toast.error('Invalid JSON file');
            }
        };
        reader.readAsText(file);
    }
    
    async clearAllData() {
        if (!confirm('Delete ALL data? This cannot be undone.')) return;
        if (!confirm('Are you absolutely sure?')) return;
        
        await this.db.clear('inspections');
        await this.db.clear('drafts');
        Toast.success('All data cleared');
        this.updateStorageStatus();
        this.showDashboard();
    }
