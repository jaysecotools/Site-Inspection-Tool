<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="theme-color" content="#1a5f4a">
    <title>TAS Environmental Inspector</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    <script src="https://unpkg.com/turf@6.5.0/turf.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    
    <style>
        /* Your existing styles - keeping them as they were */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --tas-green: #1a5f4a;
            --tas-green-dark: #0e3d2f;
            --danger: #dc2626;
            --warning: #f59e0b;
            --success: #10b981;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-700: #334155;
            --gray-800: #1e293b;
        }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--gray-100); height: 100vh; overflow: hidden; }
        .app { display: flex; height: 100vh; width: 100%; overflow: hidden; }
        
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0a241f 0%, #0a1f1a 100%);
            color: #e8f0ed;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            box-shadow: 2px 0 12px rgba(0,0,0,0.1);
            z-index: 200;
        }
        .sidebar-header { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h1 { font-size: 1.35rem; font-weight: 700; }
        .sidebar-header h1 i { color: #7abf9e; margin-right: 10px; }
        .version { font-size: 0.7rem; opacity: 0.7; margin-top: 6px; }
        .nav-item {
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            margin: 4px 8px;
            border-radius: 12px;
        }
        .nav-item:hover { background: rgba(122,191,158,0.15); }
        .nav-item.active { background: rgba(122,191,158,0.22); border-left-color: #7abf9e; }
        .nav-item i { width: 24px; font-size: 1.1rem; }
        
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; z-index: 10; }
        .toolbar {
            background: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 1px solid var(--gray-200);
            z-index: 150;
        }
        .map-container { flex: 1; position: relative; min-height: 0; z-index: 1; }
        #map { height: 100%; width: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .btn {
            padding: 10px 18px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .btn-primary { background: var(--tas-green); color: white; }
        .btn-primary:hover { background: var(--tas-green-dark); transform: translateY(-1px); }
        .btn-secondary { background: var(--gray-100); color: var(--gray-800); border: 1px solid var(--gray-200); }
        .btn-secondary:hover { background: var(--gray-200); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-sm { padding: 6px 14px; font-size: 0.75rem; }
        
        .panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 600px;
            max-width: 92vw;
            height: 100vh;
            background: white;
            box-shadow: -8px 0 32px rgba(0,0,0,0.15);
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.2,0.9,0.4,1.1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel.open { transform: translateX(0); }
        .panel-header { padding: 18px 24px; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; }
        .panel-content { padding: 20px 24px; flex: 1; overflow-y: auto; }
        
        .form-section {
            margin-bottom: 20px;
            border: 1px solid var(--gray-200);
            border-radius: 16px;
            overflow: hidden;
            background: white;
        }
        .section-header {
            background: var(--gray-100);
            padding: 16px 18px;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--tas-green);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section-content { padding: 18px; border-top: 1px solid var(--gray-200); }
        .section-content.collapsed { display: none; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--gray-700); margin-bottom: 6px; }
        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--gray-200);
            border-radius: 12px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.2s;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--tas-green); }
        input[type="range"] { padding: 0; }
        
        .photo-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
            max-height: 280px;
            overflow-y: auto;
        }
        .photo-item {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 14px;
            overflow: hidden;
            border: 2px solid var(--gray-200);
            background: var(--gray-100);
        }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        .remove-photo {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(220,38,38,0.9);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        .photo-meta {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.65);
            color: white;
            font-size: 9px;
            padding: 3px 6px;
            text-align: center;
        }
        
        .health-meter { background: var(--gray-200); border-radius: 30px; height: 8px; overflow: hidden; margin: 10px 0; }
        .health-fill { height: 100%; background: linear-gradient(90deg, var(--danger), var(--warning), var(--success)); width: 0%; border-radius: 30px; transition: width 0.3s ease; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 700; }
        .badge-good { background: var(--success); color: white; }
        .badge-mod { background: var(--warning); color: white; }
        .badge-poor { background: var(--danger); color: white; }
        
        .status-badge {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }
        .draw-info {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            z-index: 100;
            display: flex;
            gap: 16px;
            pointer-events: none;
        }
        .layer-toggle {
            position: absolute;
            top: 80px;
            right: 12px;
            background: white;
            border-radius: 14px;
            padding: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 120px;
        }
        .layer-item { padding: 8px 12px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-radius: 10px; }
        .layer-item:hover { background: var(--gray-100); }
        .locate-btn {
            position: absolute;
            bottom: 90px;
            right: 12px;
            background: white;
            border-radius: 50px;
            padding: 12px 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            z-index: 200;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--tas-green);
            border: none;
        }
        .locate-btn:hover { background: var(--gray-100); }
        
        .notification {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gray-800);
            color: white;
            padding: 14px 28px;
            border-radius: 60px;
            z-index: 2000;
            animation: fadeOut 3s forwards;
            font-size: 14px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            font-weight: 500;
        }
        @keyframes fadeOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
        }
        .inspection-card {
            border: 1px solid var(--gray-200);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 14px;
            background: white;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .inspection-card:hover { border-color: var(--tas-green); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transform: translateY(-2px); }
        
        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .sidebar-header h1, .nav-item span, .version { display: none; }
            .nav-item { justify-content: center; padding: 16px 0; margin: 4px 0; }
            .toolbar .btn span { display: none; }
            .btn { padding: 10px 14px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="sidebar-header">
            <h1><i class="fas fa-tree"></i> TAS Enviro</h1>
            <div class="version">v2.1 | Tasmania</div>
        </div>
        <div class="nav-item active" data-view="dashboard"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></div>
        <div class="nav-item" data-view="inspections"><i class="fas fa-clipboard-list"></i><span>Inspections</span></div>
        <div class="nav-item" data-view="new"><i class="fas fa-plus-circle"></i><span>New Assessment</span></div>
        <div class="nav-item" data-view="mapview"><i class="fas fa-map"></i><span>Map View</span></div>
        <div class="nav-item" data-view="drafts"><i class="fas fa-save"></i><span>Drafts</span></div>
        <div class="nav-item" data-view="data"><i class="fas fa-database"></i><span>Data Manager</span></div>
    </div>

    <div class="main">
        <div class="toolbar">
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <button id="clearMapBtn" class="btn btn-secondary"><i class="fas fa-trash-alt"></i><span> Clear</span></button>
                <button id="exportGeoJsonBtn" class="btn btn-secondary"><i class="fas fa-download"></i><span> GeoJSON</span></button>
                <button id="exportCSVBtn" class="btn btn-secondary"><i class="fas fa-file-csv"></i><span> CSV</span></button>
                <button id="measureBtn" class="btn btn-secondary"><i class="fas fa-ruler"></i><span> Measure</span></button>
            </div>
            <div style="display:flex;gap:8px;">
                <span id="storageStatus" class="btn-secondary" style="padding:6px 14px;border-radius:30px;font-size:12px;"><i class="fas fa-database"></i> Loading...</span>
                <button id="listInspectionsBtn" class="btn btn-secondary"><i class="fas fa-folder-open"></i><span> Saved</span></button>
                <button id="newInspectionBtn" class="btn btn-primary"><i class="fas fa-plus"></i><span> New</span></button>
            </div>
        </div>
        <div class="map-container">
            <div id="map"></div>
            <div class="draw-info"><i class="fas fa-draw-polygon"></i> Draw Polygon | <i class="fas fa-map-marker-alt"></i> Add Waypoint</div>
            <div class="status-badge" id="gpsStatus"><i class="fas fa-satellite-dish"></i> GPS: Locating...</div>
        </div>
    </div>

    <div id="panel" class="panel">
        <div class="panel-header">
            <h3 id="panelTitle">Ecological Assessment</h3>
            <button id="closePanelBtn" class="btn btn-secondary btn-sm"><i class="fas fa-times"></i> Close</button>
        </div>
        <div class="panel-content" id="panelContent"></div>
    </div>
</div>

<script>
class TASEnvironmentalInspector {
    constructor() {
        this.state = {
            map: null,
            drawnItems: null,
            db: null,
            dbReady: false,
            currentId: null,
            currentPhotos: [],
            currentLat: -42.8806,
            currentLng: 147.3250,
            geometry: [],
            waypoints: [],
            isFinalised: false,
            currentBaseLayer: null,
            satLayer: null,
            topoLayer: null,
            measuring: false,
            measurePoints: [],
            measureLine: null,
            measureMarkers: []
        };
        
        this.tasmanianVegetationTypes = [
            'Dry Eucalypt Forest', 'Wet Eucalypt Forest', 'Rainforest',
            'Moorland', 'Grassland', 'Coastal Heath', 'Saltmarsh',
            'Alpine Vegetation', 'Riparian Forest', 'Plantation'
        ];
    }

    async init() {
        await this.initDB();
        this.initMap();
        this.initGPS();
        this.bindEvents();
        this.updateStorageStatus();
        this.showNotification('TAS Environmental Inspector v2.1 ready', 'success');
    }

    async initDB() {
        return new Promise((resolve) => {
            const req = indexedDB.open('TAS_Environmental_Inspector_v2', 2);
            req.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('inspections')) {
                    db.createObjectStore('inspections', { keyPath: 'id' });
                }
                if (!db.objectStoreNames.contains('drafts')) {
                    db.createObjectStore('drafts', { keyPath: 'id' });
                }
            };
            req.onsuccess = (e) => {
                this.state.db = e.target.result;
                this.state.dbReady = true;
                resolve();
            };
            req.onerror = () => resolve();
        });
    }

    async saveInspection(data, isDraft = false) {
        if (!this.state.dbReady) {
            localStorage.setItem(`${isDraft ? 'draft_' : 'insp_'}${data.id}`, JSON.stringify(data));
            return;
        }
        const store = isDraft ? 'drafts' : 'inspections';
        const tx = this.state.db.transaction([store], 'readwrite');
        tx.objectStore(store).put(data);
        this.updateStorageStatus();
    }

    async getAllInspections() {
        if (!this.state.dbReady) {
            return Object.keys(localStorage).filter(k => k.startsWith('insp_')).map(k => JSON.parse(localStorage.getItem(k)));
        }
        const tx = this.state.db.transaction(['inspections'], 'readonly');
        return new Promise(resolve => {
            const req = tx.objectStore('inspections').getAll();
            req.onsuccess = () => resolve(req.result || []);
        });
    }

    async getAllDrafts() {
        if (!this.state.dbReady) {
            return Object.keys(localStorage).filter(k => k.startsWith('draft_')).map(k => JSON.parse(localStorage.getItem(k)));
        }
        const tx = this.state.db.transaction(['drafts'], 'readonly');
        return new Promise(resolve => {
            const req = tx.objectStore('drafts').getAll();
            req.onsuccess = () => resolve(req.result || []);
        });
    }

    async getInspection(id, isDraft = false) {
        if (!this.state.dbReady) {
            return JSON.parse(localStorage.getItem(`${isDraft ? 'draft_' : 'insp_'}${id}`));
        }
        const store = isDraft ? 'drafts' : 'inspections';
        const tx = this.state.db.transaction([store], 'readonly');
        return new Promise(resolve => {
            const req = tx.objectStore(store).get(id);
            req.onsuccess = () => resolve(req.result);
        });
    }

    async deleteInspection(id, isDraft = false) {
        if (!this.state.dbReady) {
            localStorage.removeItem(`${isDraft ? 'draft_' : 'insp_'}${id}`);
            return;
        }
        const store = isDraft ? 'drafts' : 'inspections';
        const tx = this.state.db.transaction([store], 'readwrite');
        tx.objectStore(store).delete(id);
        this.updateStorageStatus();
    }

    async updateStorageStatus() {
        if (!this.state.dbReady) {
            document.getElementById('storageStatus').innerHTML = '<i class="fas fa-database"></i> Local Storage';
            return;
        }
        const inspections = await this.getAllInspections();
        const drafts = await this.getAllDrafts();
        document.getElementById('storageStatus').innerHTML = `<i class="fas fa-database"></i> ${inspections.length} Reports | ${drafts.length} Drafts`;
    }

    calculateEcologicalScore(data) {
        const vegHealth = parseFloat(data.vegHealth || 6);
        const speciesRichness = parseFloat(data.speciesRichness || 5);
        const weedCover = parseFloat(data.weedCover || 30);
        const habitatQuality = parseFloat(data.habitatQuality || 5);
        const disturbance = parseFloat(data.disturbance || 3);
        const regeneration = parseFloat(data.regeneration || 5);
        
        const conditionScore = (vegHealth * 0.25) + (speciesRichness * 0.2) + 
                               ((100 - weedCover) / 10 * 0.2) + (habitatQuality * 0.15) +
                               ((10 - disturbance) * 0.1) + (regeneration * 0.1);
        const finalScore = Math.min(10, Math.max(0, conditionScore));
        
        let riskRating = 'Low Risk';
        let managementPriority = 'Routine Monitoring';
        
        if (finalScore < 3) {
            riskRating = 'Critical';
            managementPriority = 'Immediate Intervention Required';
        } else if (finalScore < 5) {
            riskRating = 'High Risk';
            managementPriority = 'Urgent Management Required';
        } else if (finalScore < 7) {
            riskRating = 'Medium Risk';
            managementPriority = 'Short-term Management Plan';
        } else if (finalScore < 8.5) {
            riskRating = 'Low Risk';
            managementPriority = 'Regular Monitoring';
        } else {
            riskRating = 'Excellent';
            managementPriority = 'Maintenance Only';
        }
        
        return {
            conditionScore: parseFloat(finalScore.toFixed(1)),
            riskRating,
            managementPriority,
            tasmanianSignificance: finalScore > 7 ? 'High Conservation Value' : (finalScore > 5 ? 'Moderate Conservation Value' : 'Low Conservation Value')
        };
    }

    async compressImage(dataURL, maxWidth = 800) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width, height = img.height;
                if (width > maxWidth) {
                    height = (height * maxWidth) / width;
                    width = maxWidth;
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', 0.8));
            };
            img.src = dataURL;
        });
    }

    async handlePhotos(files) {
        for (const file of Array.from(files)) {
            const reader = new FileReader();
            await new Promise((resolve) => {
                reader.onload = async (e) => {
                    const compressed = await this.compressImage(e.target.result, 800);
                    this.state.currentPhotos.push({
                        id: this.uuid(),
                        dataURL: compressed,
                        timestamp: new Date().toISOString(),
                        lat: this.state.currentLat,
                        lng: this.state.currentLng
                    });
                    resolve();
                };
                reader.readAsDataURL(file);
            });
        }
        this.renderGallery();
        this.showNotification(`${files.length} photo(s) added`, 'success');
    }

    renderGallery() {
        const g = document.getElementById('photoGallery');
        if (!g) return;
        if (this.state.currentPhotos.length === 0) {
            g.innerHTML = '<div style="padding:24px;text-align:center;color:#94a3b8;"><i class="fas fa-camera"></i> No photos captured</div>';
            return;
        }
        g.innerHTML = this.state.currentPhotos.map((p, idx) => `
            <div class="photo-item">
                <img src="${p.dataURL}" alt="Field photo">
                <div class="photo-meta">${new Date(p.timestamp).toLocaleTimeString()}</div>
                <div class="remove-photo" data-idx="${idx}">×</div>
            </div>
        `).join('');
        document.querySelectorAll('.remove-photo').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const idx = parseInt(el.dataset.idx);
                this.state.currentPhotos.splice(idx, 1);
                this.renderGallery();
            });
        });
    }

    initMap() {
        this.state.map = L.map('map').setView([-42.8806, 147.3250], 10);
        
        this.state.currentBaseLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
        }).addTo(this.state.map);
        
        this.state.satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '&copy; Esri'
        });
        
        this.state.topoLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenTopoMap'
        });
        
        this.state.drawnItems = L.featureGroup().addTo(this.state.map);
        
        const drawControl = new L.Control.Draw({
            position: 'topleft',
            draw: {
                polygon: { shapeOptions: { color: '#1a5f4a', weight: 3 }, showArea: true },
                rectangle: true,
                marker: true,
                circle: false,
                polyline: false
            },
            edit: { featureGroup: this.state.drawnItems, remove: true }
        });
        this.state.map.addControl(drawControl);
        
        this.state.map.on(L.Draw.Event.CREATED, (e) => {
            const layer = e.layer;
            const geojson = layer.toGeoJSON();
            this.state.geometry.push(geojson);
            this.state.drawnItems.addLayer(layer);
            if (e.layerType === 'polygon') {
                const area = turf.area(geojson) / 10000;
                this.showNotification(`Polygon added: ${area.toFixed(2)} hectares`, 'success');
            } else if (e.layerType === 'marker') {
                this.state.waypoints.push({
                    id: this.uuid(),
                    lat: layer.getLatLng().lat,
                    lng: layer.getLatLng().lng,
                    label: `WP${this.state.waypoints.length + 1}`
                });
                this.showNotification('Waypoint added', 'success');

        this.state.map.on('click', (e) => {

            <div class="layer-item" id="toggleSatMap"><i class="fas fa-satellite"></i> Satellite</div>
            <div class="layer-item" id="toggleTopo"><i class="fas fa-mountain"></i> Topographic</div>

        const locateBtn = document.createElement('button');
        locateBtn.className = 'locate-btn';
        locateBtn.innerHTML = '<i class="fas fa-location-arrow"></i> Use My Location';
        document.querySelector('.map-container').appendChild(locateBtn);
        locateBtn.addEventListener('click', () => this.locateUser());
        
        document.getElementById('toggleLight').onclick = () => {
            if (this.state.satLayer && this.state.map.hasLayer(this.state.satLayer)) this.state.map.removeLayer(this.state.satLayer);
            if (this.state.topoLayer && this.state.map.hasLayer(this.state.topoLayer)) this.state.map.removeLayer(this.state.topoLayer);
            if (!this.state.map.hasLayer(this.state.currentBaseLayer)) this.state.currentBaseLayer.addTo(this.state.map);
        };
        
        document.getElementById('toggleSatMap').onclick = () => {
            if (this.state.currentBaseLayer && this.state.map.hasLayer(this.state.currentBaseLayer)) this.state.map.removeLayer(this.state.currentBaseLayer);
            if (this.state.topoLayer && this.state.map.hasLayer(this.state.topoLayer)) this.state.map.removeLayer(this.state.topoLayer);
            if (!this.state.map.hasLayer(this.state.satLayer)) this.state.satLayer.addTo(this.state.map);
        };
        
        document.getElementById('toggleTopo').onclick = () => {
            if (this.state.currentBaseLayer && this.state.map.hasLayer(this.state.currentBaseLayer)) this.state.map.removeLayer(this.state.currentBaseLayer);
            if (this.state.satLayer && this.state.map.hasLayer(this.state.satLayer)) this.state.map.removeLayer(this.state.satLayer);
            if (!this.state.map.hasLayer(this.state.topoLayer)) this.state.topoLayer.addTo(this.state.map);
        };
    }

    locateUser() {
        if (!navigator.geolocation) {
            this.showNotification('Geolocation not supported', 'warning');
            return;
        }
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                this.state.map.setView([lat, lng], 16);
                this.state.currentLat = lat;
                this.state.currentLng = lng;
                this.showNotification('Location found', 'success');
            },
            () => {
                this.showNotification('Could not retrieve location', 'warning');
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    initGPS() {
        if (!navigator.geolocation) {
            document.getElementById('gpsStatus').innerHTML = '<i class="fas fa-exclamation-triangle"></i> GPS not supported';
            return;
        }
        let marker = null;
        navigator.geolocation.watchPosition(
            pos => {
                this.state.currentLat = pos.coords.latitude;
                this.state.currentLng = pos.coords.longitude;
                document.getElementById('gpsStatus').innerHTML = `<i class="fas fa-check-circle"></i> GPS: ±${Math.round(pos.coords.accuracy)}m`;
                if (!marker) {
                    marker = L.marker([this.state.currentLat, this.state.currentLng], {
                        icon: L.divIcon({ html: '<i class="fas fa-location-dot" style="color:#dc2626;font-size:22px;"></i>', iconSize: [22, 22] })
                    }).addTo(this.state.map);
                } else {
                    marker.setLatLng([this.state.currentLat, this.state.currentLng]);
                }
            },
            () => document.getElementById('gpsStatus').innerHTML = '<i class="fas fa-exclamation"></i> GPS unavailable',
            { enableHighAccuracy: true }
        );
    }

    startMeasure() {
        if (this.state.measuring) {
            this.state.measuring = false;
            if (this.state.measureLine) {
                this.state.map.removeLayer(this.state.measureLine);
                this.state.measureLine = null;
            }
            this.state.measureMarkers.forEach(m => this.state.map.removeLayer(m));
            this.state.measureMarkers = [];
            this.state.measurePoints = [];
            this.state.map.off('click', this.measureClickHandler);
            this.showNotification('Measure mode OFF', 'info');
            return;
        }
        
        this.state.measuring = true;
        this.state.measurePoints = [];
        this.showNotification('Measure mode ON - Click two points on the map', 'info');
        
        this.measureClickHandler = (e) => {
            if (!this.state.measuring) return;
            
            const latlng = e.latlng;
            this.state.measurePoints.push(latlng);
            
            const marker = L.marker(latlng, {
                icon: L.divIcon({ 
                    html: `<div style="background:#f59e0b;color:white;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-weight:bold;border:2px solid white;">${this.state.measurePoints.length}</div>`,
                    iconSize: [24, 24]
                })
            }).addTo(this.state.map);
            this.state.measureMarkers.push(marker);
            
            if (this.state.measurePoints.length === 2) {
                const p1 = this.state.measurePoints[0];
                const p2 = this.state.measurePoints[1];
                const R = 6371;
                const dLat = (p2.lat - p1.lat) * Math.PI / 180;
                const dLon = (p2.lng - p1.lng) * Math.PI / 180;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                          Math.cos(p1.lat * Math.PI / 180) * Math.cos(p2.lat * Math.PI / 180) *
                          Math.sin(dLon/2) * Math.sin(dLon/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                const distanceKm = R * c;
                const distanceM = distanceKm * 1000;
                
                let distanceText = distanceKm >= 1 ? `${distanceKm.toFixed(3)} km` : `${distanceM.toFixed(1)} m`;
                
                if (this.state.measureLine) this.state.map.removeLayer(this.state.measureLine);
                this.state.measureLine = L.polyline(this.state.measurePoints, { color: '#f59e0b', weight: 4, dashArray: '8, 8' }).addTo(this.state.map);
                
                const midLat = (p1.lat + p2.lat) / 2;
                const midLng = (p1.lng + p2.lng) / 2;
                const label = L.divIcon({
                    html: `<div style="background:#1a5f4a;color:white;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:bold;">📏 ${distanceText}</div>`,
                    iconSize: [null, null]
                });
                const labelMarker = L.marker([midLat, midLng], { icon: label }).addTo(this.state.map);
                this.state.measureMarkers.push(labelMarker);
                
                this.showNotification(`Distance: ${distanceText}`, 'success');
                
                setTimeout(() => {
                    if (this.state.measuring) {
                        this.state.measuring = false;
                        this.state.map.off('click', this.measureClickHandler);
                        this.showNotification('Measure mode OFF', 'info');
                    }
                }, 2000);
            }
        };
        
        this.state.map.on('click', this.measureClickHandler);
    }

    uuid() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
            const r = Math.random() * 16 | 0;
            const v = c === 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    showNotification(msg, type = 'success') {
        const n = document.createElement('div');
        n.className = 'notification';
        const icon = type === 'success' ? 'fa-check-circle' : (type === 'warning' ? 'fa-exclamation-triangle' : 'fa-info-circle');
        n.innerHTML = `<i class="fas ${icon}"></i> ${msg}`;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 3000);
    }

    bindFormEvents() {
        const photoInput = document.getElementById('photoInput');
        if (photoInput) photoInput.onchange = (e) => this.handlePhotos(e.target.files);

        document.getElementById('saveDraftBtn').onclick = async () => {
            const data = this.collectFormData();
            await this.saveInspection(data, true);
            this.showNotification('Draft saved', 'success');
            this.updateStorageStatus();
        };
        
        document.getElementById('finaliseBtn').onclick = async () => {
            const data = this.collectFormData();
            if (!data.siteName) {
                this.showNotification('Site name is required', 'warning');
                return;
            }
            data.status = 'finalised';
            this.state.isFinalised = true;
            const eco = this.calculateEcologicalScore(data);
            data.ecologicalScore = eco;
            await this.saveInspection(data, false);
            await this.generatePDF(data);
            await this.deleteInspection(data.id, true);
            this.showNotification('Inspection finalised and PDF generated', 'success');
            this.closePanel();
            this.showInspections();
            this.updateStorageStatus();
        };
        
        document.getElementById('cancelBtn').onclick = () => this.closePanel();
        
        document.querySelectorAll('.section-header').forEach(h => {
            h.addEventListener('click', () => {
                h.classList.toggle('collapsed');
                h.nextElementSibling.classList.toggle('collapsed');
            });
        });
        
        ['vegHealth', 'speciesRichness', 'regeneration', 'weedCover', 'habitatQuality', 'disturbance'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.oninput = () => {
                const data = this.collectFormData();
                const eco = this.calculateEcologicalScore(data);
                const fill = document.querySelector('.health-fill');
                if (fill) fill.style.width = `${eco.conditionScore * 10}%`;
            };
        });
    }

    async captureMapImage() {
        return new Promise((resolve) => {
            try {
                const mapContainer = document.getElementById('map');
                if (!mapContainer) {
                    resolve(null);
                    return;
                }

                // Use html2canvas on the map container
                html2canvas(mapContainer, {
                    scale: 1.5,
                    useCORS: true,
                    backgroundColor: '#ffffff',
                    logging: false,
                    width: mapContainer.clientWidth,
                    height: mapContainer.clientHeight
                }).then(canvas => {
                    if (canvas) {
                        resolve(canvas.toDataURL('image/jpeg', 0.85));
                    } else {
                        resolve(null);
                    }
                }).catch(() => {
                    resolve(null);
                });
            } catch (e) {
                console.warn('Map capture failed:', e);
                resolve(null);
            }
        });
    }

                        <div class="info-row"><span class="info-label">Date/Time:</span><span class="info-value">${inspection.dateTime || 'Not recorded'}</span></div>
                        <div class="info-row"><span class="info-label">Coordinates:</span><span class="info-value">${inspection.coords || 'Not recorded'}</span></div>
                    </div>
                    <div>
                        <div class="info-row"><span class="info-label">Vegetation:</span><span class="info-value">${inspection.vegetationType || 'Not recorded'}</span></div>
                        <div class="info-row"><span class="info-label">Tenure:</span><span class="info-value">${this.escapeHtml(inspection.tenure || 'Not recorded')}</span></div>
                        <div class="info-row"><span class="info-label">Weather:</span><span class="info-value">${this.escapeHtml(inspection.weather || 'Not recorded')}</span></div>
                        <div class="info-row"><span class="info-label">Soil:</span><span class="info-value">${this.escapeHtml(inspection.soilCondition || 'Not recorded')}</span></div>
                    </div>
                </div>
            </div>
            
            <div class="section">
                <h2>Ecological Health Assessment</h2>
                <div class="score-box">
                    <div><strong>Condition Score:</strong> ${eco.conditionScore}/10</div>
                    <div><strong>Risk Rating:</strong> <span class="badge ${eco.conditionScore >= 7 ? 'badge-good' : (eco.conditionScore >= 5 ? 'badge-mod' : 'badge-poor')}">${eco.riskRating}</span></div>
                    <div><strong>Management Priority:</strong> ${eco.managementPriority}</div>
                    <div><strong>Tasmanian Significance:</strong> ${eco.tasmanianSignificance}</div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 20px;font-size:13px;margin-top:10px;">
                    <div><strong>Vegetation Health:</strong> ${inspection.vegHealth || 0}/10</div>
                    <div><strong>Species Richness:</strong> ${inspection.speciesRichness || 0}/10</div>
                    <div><strong>Regeneration:</strong> ${inspection.regeneration || 0}/10</div>
                    <div><strong>Weed Cover:</strong> ${inspection.weedCover || 0}%</div>
                    <div><strong>Habitat Quality:</strong> ${inspection.habitatQuality || 0}/10</div>
                    <div><strong>Disturbance:</strong> ${inspection.disturbance || 0}/10</div>
                </div>
            </div>
            
            <div class="section">
                <h2>Threats & Management</h2>
                <div class="info-row"><span class="info-label">Declared Weeds:</span><span class="info-value">${this.escapeHtml(inspection.weedsList) || 'None recorded'}</span></div>
                <div class="info-row"><span class="info-label">Feral Animals:</span><span class="info-value">${inspection.feralAnimals || 'Not recorded'}</span></div>
                <div class="info-row"><span class="info-label">Fire History:</span><span class="info-value">${this.escapeHtml(inspection.fireHistory) || 'Not recorded'}</span></div>
                <div class="info-row"><span class="info-label">Threat Level:</span><span class="info-value">${inspection.threatLevel || 'Not rated'}</span></div>
            </div>
            
            <div class="section">
                <h2>Field Observations</h2>
                <div class="note-box">${this.escapeHtml(inspection.observations) || 'No observations recorded'}</div>
            </div>
            
            <div class="section">
                <h2>Management Recommendations</h2>
                <div class="note-box">${this.escapeHtml(inspection.recommendations) || 'No recommendations provided'}</div>
            </div>
            
            ${mapImage ? `
            <div class="section">
                <h2>Site Map</h2>
                <div class="map-container">
                    <img src="${mapImage}" alt="Site Map">
                </div>
                <div style="font-size:11px;color:#666;margin-top:4px;">
                    Map showing inspection location and drawn features
                </div>
            </div>
            ` : `
            <div class="section">
                <h2>Site Map</h2>
                <div class="map-placeholder">
                    <i class="fas fa-map"></i> Map image could not be captured for this report.
                </div>
            </div>
            `}
            
            ${inspection.photos && inspection.photos.length > 0 ? `
            <div class="section">
                <h2>Photos (${inspection.photos.length})</h2>
                <div class="photo-grid">
                    ${inspection.photos.slice(0, 8).map(p => `
                        <div>
                            <img src="${p.dataURL}" alt="Field photo">
                            <div class="caption">${new Date(p.timestamp).toLocaleDateString()}</div>
                        </div>
                    `).join('')}
                </div>
                ${inspection.photos.length > 8 ? `<div style="font-size:12px;color:#666;">+ ${inspection.photos.length - 8} more photos</div>` : ''}
            </div>
            ` : ''}
            
            <div class="footer">
                <p><strong>Tasmanian Environmental Inspector v2.1</strong></p>
                <p>Report ID: ${inspection.id} | Generated: ${new Date().toLocaleString()}</p>
                <p>This report was generated offline from field observations</p>
            </div>
        </body>
        </html>
        `;
        
        // Use html2pdf with the content in an iframe
        const iframe = document.createElement('iframe');
        iframe.style.cssText = 'position: fixed; left: -9999px; top: 0; width: 1100px; height: 100vh; border: none;';
        document.body.appendChild(iframe);
        
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        doc.open();
        doc.write(reportHTML);
        doc.close();
        
        // Wait for images
        await new Promise(resolve => {
            const images = doc.querySelectorAll('img');
            let loaded = 0;
            const total = images.length;
            if (total === 0) { resolve(); return; }
            images.forEach(img => {
                if (img.complete) {
                    loaded++;
                    if (loaded === total) resolve();
                } else {
                    img.onload = () => { loaded++; if (loaded === total) resolve(); };
                    img.onerror = () => { loaded++; if (loaded === total) resolve(); };
                }
            });
            setTimeout(resolve, 5000);
        });
        
        // Generate PDF
        try {
            const pdfOptions = {
                margin: [10, 10, 10, 10],
                filename: `TAS_Enviro_Report_${inspection.id}.pdf`,
                image: { type: 'jpeg', quality: 0.95 },
                html2canvas: { scale: 1.5, useCORS: true, logging: false },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            
            await html2pdf().set(pdfOptions).from(iframe.contentDocument.body).save();
        } catch (e) {
            console.error('PDF failed:', e);
            this.showNotification('PDF generation failed, try again', 'error');
        }
        
        document.body.removeChild(iframe);
    }

    // ===== REST OF THE APP =====
    async exportToCSV() {
        const inspections = await this.getAllInspections();
        if (inspections.length === 0) {
            this.showNotification('No inspections to export', 'warning');
            return;
        }
        const csvData = inspections.map(i => ({
            'ID': i.id, 'Site Name': i.siteName, 'Inspector': i.inspector,
            'Organization': i.organization, 'Date': i.dateTime, 'Coordinates': i.coords,
            'Vegetation Type': i.vegetationType, 'Condition Score': i.ecologicalScore?.conditionScore || '',
            'Risk Rating': i.ecologicalScore?.riskRating || '', 'Management Priority': i.ecologicalScore?.managementPriority || '',
            'Veg Health': i.vegHealth, 'Species Richness': i.speciesRichness,
            'Weed Cover %': i.weedCover, 'Habitat Quality': i.habitatQuality,
            'Disturbance': i.disturbance, 'Threat Level': i.threatLevel,
            'Observations': i.observations, 'Recommendations': i.recommendations,
            'Photo Count': i.photos?.length || 0, 'Geometry Count': i.geometry?.length || 0
        }));
        const ws = XLSX.utils.json_to_sheet(csvData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Inspections');
        XLSX.writeFile(wb, `TAS_Inspections_${new Date().toISOString().slice(0,19)}.xlsx`);
        this.showNotification('Excel export complete', 'success');
    }

    async exportToJSON() {
        const inspections = await this.getAllInspections();
        const drafts = await this.getAllDrafts();
        const exportData = {
            exportDate: new Date().toISOString(),
            version: '2.1',
            inspections: inspections,
            drafts: drafts
        };
        const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `TAS_Enviro_Data_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        this.showNotification('JSON export complete', 'success');
    }

    async importFromJSON(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    let imported = 0;
                    if (data.inspections) {
                        for (const insp of data.inspections) {
                            await this.saveInspection(insp, false);
                            imported++;
                        }
                    }
                    if (data.drafts) {
                        for (const draft of data.drafts) {
                            await this.saveInspection(draft, true);
                            imported++;
                        }
                    }
                    this.showNotification(`Imported ${imported} records`, 'success');
                    this.updateStorageStatus();
                    resolve();
                } catch (err) {
                    this.showNotification('Invalid JSON file', 'error');
                    reject(err);
                }
            };
            reader.readAsText(file);
        });
    }

    async newInspection() {
        this.state.currentId = this.uuid();
        this.state.currentPhotos = [];
        this.state.geometry = [];
        this.state.waypoints = [];
        this.state.isFinalised = false;
        if (this.state.drawnItems) this.state.drawnItems.clearLayers();
        document.getElementById('panelContent').innerHTML = this.renderForm({ id: this.state.currentId });
        document.getElementById('panelTitle').innerHTML = 'New Ecological Assessment';
        this.openPanel();
        this.bindFormEvents();
    }

    async loadInspection(insp, isDraft = false) {
        this.state.currentId = insp.id;
        this.state.currentPhotos = insp.photos || [];
        this.state.geometry = insp.geometry || [];
        this.state.waypoints = insp.waypoints || [];
        this.state.isFinalised = insp.status === 'finalised';
        if (this.state.drawnItems && this.state.geometry.length) {
            this.state.geometry.forEach(g => { try { L.geoJSON(g).addTo(this.state.drawnItems); } catch(e) {} });
        }
        document.getElementById('panelContent').innerHTML = this.renderForm(insp);
        document.getElementById('panelTitle').innerHTML = isDraft ? 'Edit Draft' : 'View Inspection';
        this.openPanel();
        this.bindFormEvents();
        this.renderGallery();
    }

    async showInspections() {
        const inspections = await this.getAllInspections();
        this.openPanel();
        document.getElementById('panelTitle').innerHTML = 'Finalised Inspections';
        if (inspections.length === 0) {
            document.getElementById('panelContent').innerHTML = `<div style="text-align:center;padding:48px;"><p><i class="fas fa-folder-open" style="font-size:48px;opacity:0.5;"></i></p><p>No finalised inspections</p><button id="startNew" class="btn btn-primary">Start New Assessment</button></div>`;
            document.getElementById('startNew')?.addEventListener('click', () => this.newInspection());
            return;
        }
        let html = inspections.map(ins => `
            <div class="inspection-card" data-id="${ins.id}">
                <strong><i class="fas fa-tree"></i> ${this.escapeHtml(ins.siteName)}</strong><br>
                <small>${ins.dateTime} | Score: ${ins.ecologicalScore?.conditionScore || 0}/10 | ${ins.ecologicalScore?.riskRating || 'Not rated'}</small>
                <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;">
                    <button class="btn btn-secondary view-final" data-id="${ins.id}">View</button>
                    <button class="btn btn-primary pdf-final" data-id="${ins.id}"><i class="fas fa-file-pdf"></i> PDF</button>
                    <button class="btn btn-danger del-final" data-id="${ins.id}">Delete</button>
                </div>
            </div>
        `).join('');
        html += `<button id="viewDraftsBtn" class="btn btn-secondary" style="width:100%;margin-top:16px;"><i class="fas fa-save"></i> View Drafts</button>`;
        document.getElementById('panelContent').innerHTML = html;
        
        document.querySelectorAll('.view-final').forEach(btn => {
            btn.onclick = async () => { const insp = await this.getInspection(btn.dataset.id); if (insp) this.loadInspection(insp, false); };
        });
        document.querySelectorAll('.pdf-final').forEach(btn => {
            btn.onclick = async () => { const insp = await this.getInspection(btn.dataset.id); if (insp) this.generatePDF(insp); };
        });
        document.querySelectorAll('.del-final').forEach(btn => {
            btn.onclick = async () => { if (confirm('Delete permanently?')) { await this.deleteInspection(btn.dataset.id, false); this.showInspections(); } };
        });
        document.getElementById('viewDraftsBtn').onclick = () => this.showDrafts();
    }

    async showDrafts() {
        const drafts = await this.getAllDrafts();
        this.openPanel();
        document.getElementById('panelTitle').innerHTML = 'Draft Inspections';
        if (drafts.length === 0) {
            document.getElementById('panelContent').innerHTML = `<div style="text-align:center;padding:48px;"><p>No drafts found</p><button id="backToInsp" class="btn btn-secondary">Back to Inspections</button></div>`;
            document.getElementById('backToInsp')?.addEventListener('click', () => this.showInspections());
            return;
        }
        let html = drafts.map(d => `
            <div class="inspection-card">
                <strong><i class="fas fa-pen-fancy"></i> ${this.escapeHtml(d.siteName || 'Unnamed Draft')}</strong><br>
                <small>Last edited: ${new Date(d.updatedAt).toLocaleString()}</small>
                <div style="display:flex;gap:8px;margin-top:12px;">
                    <button class="btn btn-secondary resume-draft" data-id="${d.id}">Resume</button>
                    <button class="btn btn-danger delete-draft" data-id="${d.id}">Delete</button>
                </div>
            </div>
        `).join('');
        html += `<button id="backToFinal" class="btn btn-secondary" style="width:100%;margin-top:16px;">Back to Finalised</button>`;
        document.getElementById('panelContent').innerHTML = html;
        
        document.querySelectorAll('.resume-draft').forEach(btn => {
            btn.onclick = async () => { const draft = await this.getInspection(btn.dataset.id, true); if (draft) this.loadInspection(draft, true); };
        });
        document.querySelectorAll('.delete-draft').forEach(btn => {
            btn.onclick = async () => { await this.deleteInspection(btn.dataset.id, true); this.showDrafts(); };
        });
        document.getElementById('backToFinal').onclick = () => this.showInspections();
    }

    async showDashboard() {
        const inspections = await this.getAllInspections();
        const avg = inspections.length ? (inspections.reduce((s, i) => s + (i.ecologicalScore?.conditionScore || 0), 0) / inspections.length).toFixed(1) : 0;
        const highValue = inspections.filter(i => i.ecologicalScore?.conditionScore >= 7).length;
        const critical = inspections.filter(i => i.ecologicalScore?.conditionScore < 4).length;
        
        this.openPanel();
        document.getElementById('panelTitle').innerHTML = 'Dashboard';
        document.getElementById('panelContent').innerHTML = `
            <div style="text-align:center;">
                <div style="background:linear-gradient(135deg,#1a5f4a,#0e3d2f);color:white;padding:32px;border-radius:20px;margin-bottom:24px;">
                    <i class="fas fa-tree" style="font-size:52px;"></i>
                    <h2>Tasmanian Environmental Inspector</h2>
                    <p>Professional Ecological Assessment Platform v2.1</p>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;">
                    <div style="background:#f0fdf4;padding:20px;border-radius:16px;"><div style="font-size:36px;font-weight:bold;">${inspections.length}</div><div>Finalised Reports</div></div>
                    <div style="background:#f0fdf4;padding:20px;border-radius:16px;"><div style="font-size:36px;font-weight:bold;">${avg}</div><div>Avg Condition Score</div></div>
                    <div style="background:#fef3c7;padding:20px;border-radius:16px;"><div style="font-size:36px;font-weight:bold;">${highValue}</div><div>High Value Sites</div></div>
                    <div style="background:#fee2e2;padding:20px;border-radius:16px;"><div style="font-size:36px;font-weight:bold;">${critical}</div><div>Critical Sites</div></div>
                </div>
                <button id="dashNew" class="btn btn-primary" style="width:100%;"><i class="fas fa-plus"></i> New Assessment</button>
                <button id="dashDrafts" class="btn btn-secondary" style="width:100%;margin-top:12px;"><i class="fas fa-save"></i> View Drafts</button>
            </div>
        `;
        document.getElementById('dashNew')?.addEventListener('click', () => this.newInspection());
        document.getElementById('dashDrafts')?.addEventListener('click', () => this.showDrafts());
    }

    async showDataManager() {
        this.openPanel();
        document.getElementById('panelTitle').innerHTML = 'Data Manager';
        document.getElementById('panelContent').innerHTML = `
            <div style="padding:20px;">
                <h3><i class="fas fa-download"></i> Export Data</h3>
                <button id="exportCSVData" class="btn btn-primary" style="width:100%;margin-bottom:10px;"><i class="fas fa-file-excel"></i> Export to Excel</button>
                <button id="exportJSONData" class="btn btn-secondary" style="width:100%;margin-bottom:20px;"><i class="fas fa-code"></i> Export to JSON</button>
                <h3><i class="fas fa-upload"></i> Import Data</h3>
                <input type="file" id="importJSONFile" accept=".json" style="margin-bottom:10px;">
                <button id="importJSONBtn" class="btn btn-secondary" style="width:100%;"><i class="fas fa-upload"></i> Import JSON</button>
                <hr style="margin:20px 0;">
                <button id="clearAllData" class="btn btn-danger" style="width:100%;"><i class="fas fa-trash"></i> Clear All Data</button>
            </div>
        `;
        document.getElementById('exportCSVData')?.addEventListener('click', () => this.exportToCSV());
        document.getElementById('exportJSONData')?.addEventListener('click', () => this.exportToJSON());
        document.getElementById('importJSONBtn')?.addEventListener('click', () => {
            const file = document.getElementById('importJSONFile').files[0];
            if (file) this.importFromJSON(file);
            else this.showNotification('Select a JSON file', 'warning');
        });
        document.getElementById('clearAllData')?.addEventListener('click', async () => {
            if (confirm('Delete ALL data? This cannot be undone.')) {
                const inspections = await this.getAllInspections();
                const drafts = await this.getAllDrafts();
                for (const insp of inspections) await this.deleteInspection(insp.id, false);
                for (const draft of drafts) await this.deleteInspection(draft.id, true);
                this.showNotification('All data cleared', 'success');
                this.updateStorageStatus();
                this.showDashboard();
            }
        });
    }

    exportGeoJSON() {
        const features = [...this.state.geometry, ...this.state.waypoints.map(w => turf.point([w.lng, w.lat], { label: w.label, type: 'waypoint' }))];
        const fc = { type: 'FeatureCollection', features };
        const blob = new Blob([JSON.stringify(fc, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `tas_enviro_export_${Date.now()}.geojson`;
        a.click();
        this.showNotification('GeoJSON exported', 'success');
    }

    openPanel() { document.getElementById('panel').classList.add('open'); }
    closePanel() { document.getElementById('panel').classList.remove('open'); }

    bindEvents() {
        document.getElementById('newInspectionBtn').onclick = () => this.newInspection();
        document.getElementById('listInspectionsBtn').onclick = () => this.showInspections();
        document.getElementById('closePanelBtn').onclick = () => this.closePanel();
        document.getElementById('clearMapBtn').onclick = () => { this.state.drawnItems?.clearLayers(); this.state.geometry = []; this.state.waypoints = []; this.showNotification('Map cleared', 'info'); };
        document.getElementById('exportGeoJsonBtn').onclick = () => this.exportGeoJSON();
        document.getElementById('exportCSVBtn').onclick = () => this.exportToCSV();
        document.getElementById('measureBtn').onclick = () => this.startMeasure();
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.onclick = () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                const view = item.dataset.view;
                if (view === 'dashboard') this.showDashboard();
                if (view === 'inspections') this.showInspections();
                if (view === 'new') this.newInspection();
                if (view === 'mapview') this.closePanel();
                if (view === 'drafts') this.showDrafts();
                if (view === 'data') this.showDataManager();
            };
        });
    }
}

// Initialize
const app = new TASEnvironmentalInspector();
app.init();
</script>
