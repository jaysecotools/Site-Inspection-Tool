<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="theme-color" content="#1a5f4a">
    <meta name="description" content="Professional Ecological Assessment Platform for field surveys, vegetation mapping, and compliance reporting">
    <title>CEM Site Inspector Pro | Ecological Assessment Platform</title>
    
    <!-- Core Libraries -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    <script src="https://unpkg.com/turf@6.5.0/turf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a5f4a;
            --primary-dark: #0e3d2f;
            --primary-light: #2d8a6e;
            --secondary: #f1f5f9;
            --danger: #dc2626;
            --warning: #f59e0b;
            --success: #10b981;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--gray-100);
            height: 100vh;
            overflow: hidden;
        }

        /* App Layout - Fixed map overlay issue */
        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        /* Sidebar - proper z-index management */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0a241f 0%, #0a1f1a 100%);
            color: #e8f0ed;
            display: flex;
            flex-direction: column;
            z-index: 200;
            flex-shrink: 0;
            box-shadow: 2px 0 12px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header h1 {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .sidebar-header h1 i {
            color: #7abf9e;
            margin-right: 10px;
        }

        .version {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 6px;
        }

        .nav-item {
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            margin: 4px 8px;
            border-radius: 12px;
        }

        .nav-item:hover {
            background: rgba(122, 191, 158, 0.15);
            transform: translateX(2px);
        }

        .nav-item.active {
            background: rgba(122, 191, 158, 0.22);
            border-left-color: #7abf9e;
        }

        .nav-item i {
            width: 24px;
            font-size: 1.1rem;
        }

        /* Main content area */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 10;
        }

        /* Toolbar */
        .toolbar {
            background: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 1px solid var(--gray-200);
            z-index: 150;
            box-shadow: var(--shadow-sm);
        }

        /* Map container - proper positioning */
        .map-container {
            flex: 1;
            position: relative;
            min-height: 0;
            z-index: 1;
        }

        #map {
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Buttons */
        .btn {
            padding: 10px 18px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--secondary);
            color: var(--gray-800);
            border: 1px solid var(--gray-200);
        }

        .btn-secondary:hover {
            background: #e2e8f0;
            transform: translateY(-1px);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 0.75rem;
        }

        /* Panel - Fixed positioning to not interfere with map */
        .panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 560px;
            max-width: 92vw;
            height: 100vh;
            background: white;
            box-shadow: -8px 0 32px rgba(0, 0, 0, 0.15);
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel.open {
            transform: translateX(0);
        }

        .panel-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }

        .panel-content {
            padding: 20px 24px;
            flex: 1;
            overflow-y: auto;
        }

        /* Form sections */
        .form-section {
            margin-bottom: 20px;
            border: 1px solid var(--gray-200);
            border-radius: 16px;
            overflow: hidden;
            background: white;
        }

        .section-header {
            background: var(--gray-50);
            padding: 16px 18px;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--primary);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .section-header:hover {
            background: #f1f5f9;
        }

        .section-content {
            padding: 18px;
            border-top: 1px solid var(--gray-200);
        }

        .section-content.collapsed {
            display: none;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--gray-700);
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--gray-200);
            border-radius: 12px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 95, 74, 0.1);
        }

        input[type="range"] {
            padding: 0;
        }

        /* Photo grid */
        .photo-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
            max-height: 280px;
            overflow-y: auto;
        }

        .photo-item {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 14px;
            overflow: hidden;
            border: 2px solid var(--gray-200);
            cursor: pointer;
            background: var(--gray-100);
            transition: transform 0.2s;
        }

        .photo-item:hover {
            transform: scale(1.02);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-photo {
            position: absolute;
            top: 6px;
            right: 6px;
            background: rgba(220, 38, 38, 0.9);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .remove-photo:hover {
            background: var(--danger);
            transform: scale(1.05);
        }

        .photo-meta {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.65);
            color: white;
            font-size: 9px;
            padding: 3px 6px;
            text-align: center;
        }

        /* Status indicators */
        .status-badge {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
            font-weight: 500;
        }

        .draw-info {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12px;
            z-index: 100;
            display: flex;
            gap: 16px;
            font-weight: 500;
        }

        /* Notifications */
        .notification {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gray-800);
            color: white;
            padding: 14px 28px;
            border-radius: 60px;
            z-index: 2000;
            animation: fadeOut 3s forwards;
            font-size: 14px;
            box-shadow: var(--shadow-lg);
            font-weight: 500;
        }

        @keyframes fadeOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
        }

        /* Cards */
        .inspection-card {
            border: 1px solid var(--gray-200);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 14px;
            background: white;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .inspection-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .health-meter {
            background: var(--gray-200);
            border-radius: 30px;
            height: 8px;
            overflow: hidden;
            margin: 10px 0;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--danger), var(--warning), var(--success));
            width: 0%;
            border-radius: 30px;
            transition: width 0.3s ease;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .badge-good { background: var(--success); color: white; }
        .badge-mod { background: var(--warning); color: white; }
        .badge-poor { background: var(--danger); color: white; }

        /* Layer toggle */
        .layer-toggle {
            position: absolute;
            top: 80px;
            right: 12px;
            background: white;
            border-radius: 14px;
            padding: 8px;
            box-shadow: var(--shadow-md);
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 120px;
        }

        .layer-item {
            padding: 8px 12px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border-radius: 10px;
            transition: background 0.2s;
        }

        .layer-item:hover {
            background: var(--gray-100);
        }

        .autosave-indicator {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: var(--primary);
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 11px;
            z-index: 1000;
            font-weight: 500;
            box-shadow: var(--shadow-sm);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .sidebar-header h1, .nav-item span, .version { display: none; }
            .nav-item { justify-content: center; padding: 16px 0; margin: 4px 0; }
            .toolbar .btn span { display: none; }
            .toolbar .btn i { margin: 0; }
            .btn { padding: 10px 14px; }
            .draw-info { font-size: 10px; gap: 8px; }
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            .panel, .toolbar, .form-section, .inspection-card, .layer-toggle {
                background: var(--gray-800);
                color: var(--gray-100);
                border-color: var(--gray-700);
            }
            .section-header { background: var(--gray-800); color: #7abf9e; }
            input, select, textarea {
                background: var(--gray-700);
                border-color: var(--gray-600);
                color: var(--gray-100);
            }
            .panel-header { background: var(--gray-800); border-color: var(--gray-700); }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="sidebar-header">
            <h1><i class="fas fa-leaf"></i> CEM Site Pro</h1>
            <div class="version">v5.1 | Enterprise Offline</div>
        </div>
        <div class="nav-item active" data-view="dashboard"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></div>
        <div class="nav-item" data-view="inspections"><i class="fas fa-clipboard-list"></i><span>Inspections</span></div>
        <div class="nav-item" data-view="new"><i class="fas fa-plus-circle"></i><span>New Assessment</span></div>
        <div class="nav-item" data-view="mapview"><i class="fas fa-map"></i><span>Map View</span></div>
        <div class="nav-item" data-view="drafts"><i class="fas fa-save"></i><span>Drafts</span></div>
    </div>

    <div class="main">
        <div class="toolbar">
            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                <button id="clearMapBtn" class="btn btn-secondary"><i class="fas fa-trash-alt"></i><span> Clear</span></button>
                <button id="exportGeoJsonBtn" class="btn btn-secondary"><i class="fas fa-download"></i><span> GeoJSON</span></button>
                <button id="measureBtn" class="btn btn-secondary"><i class="fas fa-ruler"></i><span> Measure</span></button>
                <button id="toggleSatBtn" class="btn btn-secondary"><i class="fas fa-satellite"></i><span> Satellite</span></button>
            </div>
            <div style="display: flex; gap: 8px;">
                <span id="offlineIndicator" class="btn-secondary" style="padding:6px 14px; border-radius:30px; font-size:12px;"><i class="fas fa-database"></i> Offline Ready</span>
                <button id="listInspectionsBtn" class="btn btn-secondary"><i class="fas fa-folder-open"></i><span> Saved</span></button>
                <button id="newInspectionBtn" class="btn btn-primary"><i class="fas fa-plus"></i><span> New</span></button>
            </div>
        </div>
        <div class="map-container">
            <div id="map"></div>
            <div class="draw-info"><i class="fas fa-draw-polygon"></i> Draw Polygon | <i class="fas fa-map-marker-alt"></i> Add Waypoint</div>
            <div class="status-badge" id="gpsStatus"><i class="fas fa-satellite-dish"></i> GPS: Locating...</div>
            <div id="autosaveIndicator" class="autosave-indicator" style="display:none;"><i class="fas fa-save"></i> Auto-saving...</div>
        </div>
    </div>

    <div id="panel" class="panel">
        <div class="panel-header">
            <h3 id="panelTitle">Ecological Assessment</h3>
            <button id="closePanelBtn" class="btn btn-secondary btn-sm"><i class="fas fa-times"></i> Close</button>
        </div>
        <div class="panel-content" id="panelContent"></div>
    </div>
</div>

<script>
(function() {
    // ======================= STATE MANAGEMENT =======================
    const state = {
        map: null,
        drawnItems: null,
        db: null,
        dbReady: false,
        currentId: null,
        currentPhotos: [],
        currentLat: -33.8688,
        currentLng: 151.2093,
        geometry: [],
        waypoints: [],
        isFinalised: false,
        autosaveTimer: null,
        auditLog: [],
        version: 5,
        currentInspection: null,
        currentBaseLayer: null,
        satLayer: null
    };
    
    // Helpers
    function uuid() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
            const r = Math.random() * 16 | 0;
            const v = c === 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }
    
    function notify(msg, type = 'success') {
        const n = document.createElement('div');
        n.className = 'notification';
        const icon = type === 'success' ? 'fa-check-circle' : (type === 'warning' ? 'fa-exclamation-triangle' : 'fa-info-circle');
        n.innerHTML = `<i class="fas ${icon}"></i> ${msg}`;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 3000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    // ======================= INDEXEDDB =======================
    async function initDB() {
        return new Promise((resolve) => {
            const req = indexedDB.open('CEM_SiteInspector_Pro_v5', 5);
            req.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('inspections')) {
                    const store = db.createObjectStore('inspections', { keyPath: 'id' });
                    store.createIndex('dateTime', 'dateTime');
                    store.createIndex('status', 'status');
                }
                if (!db.objectStoreNames.contains('drafts')) db.createObjectStore('drafts', { keyPath: 'id' });
            };
            req.onsuccess = (e) => {
                state.db = e.target.result;
                state.dbReady = true;
                notify('Offline database ready', 'success');
                resolve();
            };
            req.onerror = () => {
                notify('IndexedDB error, using localStorage fallback', 'warning');
                resolve();
            };
        });
    }
    
    async function saveInspection(data, isDraft = false) {
        if (!state.dbReady) {
            localStorage.setItem(`${isDraft ? 'draft_' : 'insp_'}${data.id}`, JSON.stringify(data));
            return;
        }
        const store = isDraft ? 'drafts' : 'inspections';
        const tx = state.db.transaction([store], 'readwrite');
        tx.objectStore(store).put(data);
    }
    
    async function getAllInspections() {
        if (!state.dbReady) {
            return Object.keys(localStorage).filter(k => k.startsWith('insp_')).map(k => JSON.parse(localStorage.getItem(k)));
        }
        const tx = state.db.transaction(['inspections'], 'readonly');
        return new Promise(resolve => {
            const req = tx.objectStore('inspections').getAll();
            req.onsuccess = () => resolve(req.result || []);
        });
    }
    
    async function getAllDrafts() {
        if (!state.dbReady) {
            return Object.keys(localStorage).filter(k => k.startsWith('draft_')).map(k => JSON.parse(localStorage.getItem(k)));
        }
        const tx = state.db.transaction(['drafts'], 'readonly');
        return new Promise(resolve => {
            const req = tx.objectStore('drafts').getAll();
            req.onsuccess = () => resolve(req.result || []);
        });
    }
    
    async function getInspection(id, isDraft = false) {
        if (!state.dbReady) {
            return JSON.parse(localStorage.getItem(`${isDraft ? 'draft_' : 'insp_'}${id}`));
        }
        const store = isDraft ? 'drafts' : 'inspections';
        const tx = state.db.transaction([store], 'readonly');
        return new Promise(resolve => {
            const req = tx.objectStore(store).get(id);
            req.onsuccess = () => resolve(req.result);
        });
    }
    
    async function deleteInspection(id, isDraft = false) {
        if (!state.dbReady) {
            localStorage.removeItem(`${isDraft ? 'draft_' : 'insp_'}${id}`);
            return;
        }
        const store = isDraft ? 'drafts' : 'inspections';
        const tx = state.db.transaction([store], 'readwrite');
        tx.objectStore(store).delete(id);
        notify('Inspection deleted', 'info');
    }
    
    // ======================= ECOLOGICAL SCORE ENGINE =======================
    function calculateEcologicalScore(data) {
        const vegStrata = parseFloat(data.vegStrataScore || 6);
        const habitatComplexity = parseFloat(data.habitatComplexity || 5);
        const recruitment = parseFloat(data.recruitment || 5);
        const weedCover = parseFloat(data.weedCover || 30);
        const nativeRichness = parseFloat(data.nativeRichness || 4);
        const canopyHealth = parseFloat(data.canopyHealth || 6);
        const hydrology = parseFloat(data.hydrology || 5);
        const disturbance = parseFloat(data.disturbance || 3);
        
        const conditionScore = (vegStrata * 0.2) + (habitatComplexity * 0.15) + (recruitment * 0.1) + 
                               ((100 - weedCover) / 10 * 0.15) + (nativeRichness * 0.1) + (canopyHealth * 0.1) +
                               (hydrology * 0.1) + ((10 - disturbance) * 0.1);
        const finalScore = Math.min(10, Math.max(0, conditionScore));
        
        let riskRating = 'Low Risk';
        if (finalScore < 4) riskRating = 'Critical';
        else if (finalScore < 6) riskRating = 'High Risk';
        else if (finalScore < 8) riskRating = 'Medium Risk';
        
        return {
            conditionScore: parseFloat(finalScore.toFixed(1)),
            riskRating,
            managementUrgency: finalScore < 5 ? 'Immediate Action Required' : (finalScore < 7 ? 'Short-term Plan' : 'Regular Monitoring')
        };
    }
    
    // ======================= PHOTO HANDLING =======================
    async function compressImage(dataURL, maxWidth = 800) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width, height = img.height;
                if (width > maxWidth) {
                    height = (height * maxWidth) / width;
                    width = maxWidth;
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', 0.8));
            };
            img.src = dataURL;
        });
    }
    
    async function handlePhotos(files) {
        const indicator = document.getElementById('autosaveIndicator');
        if (indicator) indicator.style.display = 'block';
        for (const file of Array.from(files)) {
            const reader = new FileReader();
            await new Promise((resolve) => {
                reader.onload = async (e) => {
                    const compressed = await compressImage(e.target.result, 800);
                    state.currentPhotos.push({
                        id: uuid(),
                        dataURL: compressed,
                        timestamp: new Date().toISOString(),
                        lat: state.currentLat,
                        lng: state.currentLng,
                        caption: ''
                    });
                    resolve();
                };
                reader.readAsDataURL(file);
            });
        }
        renderGallery();
        if (indicator) setTimeout(() => indicator.style.display = 'none', 500);
        notify(`${files.length} photo(s) added`, 'success');
    }
    
    function renderGallery() {
        const g = document.getElementById('photoGallery');
        if (!g) return;
        if (state.currentPhotos.length === 0) {
            g.innerHTML = '<div style="padding: 24px; text-align: center; color: #94a3b8;"><i class="fas fa-camera"></i> No photos captured</div>';
            return;
        }
        g.innerHTML = state.currentPhotos.map((p, idx) => `
            <div class="photo-item">
                <img src="${p.dataURL}" alt="Field photo">
                <div class="photo-meta">${new Date(p.timestamp).toLocaleTimeString()}</div>
                <div class="remove-photo" data-idx="${idx}">×</div>
            </div>
        `).join('');
        document.querySelectorAll('.remove-photo').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const idx = parseInt(el.dataset.idx);
                state.currentPhotos.splice(idx, 1);
                renderGallery();
            });
        });
    }
    
    // ======================= MAP INITIALIZATION =======================
    function initMap() {
        state.map = L.map('map').setView([-33.8688, 151.2093], 13);
        state.currentBaseLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
        }).addTo(state.map);
        
        state.satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '&copy; Esri'
        });
        
        state.drawnItems = L.featureGroup().addTo(state.map);
        
        const drawControl = new L.Control.Draw({
            position: 'topleft',
            draw: {
                polygon: { shapeOptions: { color: '#1a5f4a', weight: 3 }, showArea: true },
                rectangle: true,
                marker: true,
                circle: false,
                polyline: false
            },
            edit: { featureGroup: state.drawnItems, remove: true }
        });
        state.map.addControl(drawControl);
        
        state.map.on(L.Draw.Event.CREATED, (e) => {
            const layer = e.layer;
            const geojson = layer.toGeoJSON();
            state.geometry.push(geojson);
            state.drawnItems.addLayer(layer);
            if (e.layerType === 'polygon') {
                const area = turf.area(geojson) / 10000;
                notify(`Polygon added: ${area.toFixed(2)} hectares`, 'success');
            } else if (e.layerType === 'marker') {
                state.waypoints.push({
                    id: uuid(),
                    lat: layer.getLatLng().lat,
                    lng: layer.getLatLng().lng,
                    label: `WP${state.waypoints.length + 1}`
                });
                notify('Waypoint added', 'success');
            }
        });
        
        state.map.on('click', (e) => {
            state.currentLat = e.latlng.lat;
            state.currentLng = e.latlng.lng;
        });
        
        // Layer toggle control
        const toggleDiv = document.createElement('div');
        toggleDiv.className = 'layer-toggle';
        toggleDiv.innerHTML = `
            <div class="layer-item" id="toggleLight"><i class="fas fa-map"></i> Streets</div>
            <div class="layer-item" id="toggleSatMap"><i class="fas fa-satellite"></i> Satellite</div>
        `;
        document.querySelector('.map-container').appendChild(toggleDiv);
        
        document.getElementById('toggleLight').onclick = () => {
            if (state.satLayer && state.map.hasLayer(state.satLayer)) state.map.removeLayer(state.satLayer);
            if (!state.map.hasLayer(state.currentBaseLayer)) state.currentBaseLayer.addTo(state.map);
            notify('Streets map enabled', 'info');
        };
        document.getElementById('toggleSatMap').onclick = () => {
            if (state.currentBaseLayer && state.map.hasLayer(state.currentBaseLayer)) state.map.removeLayer(state.currentBaseLayer);
            if (!state.map.hasLayer(state.satLayer)) state.satLayer.addTo(state.map);
            notify('Satellite imagery enabled', 'info');
        };
    }
    
    // GPS
    function initGPS() {
        if (!navigator.geolocation) {
            document.getElementById('gpsStatus').innerHTML = '<i class="fas fa-exclamation-triangle"></i> GPS not supported';
            return;
        }
        let marker = null;
        navigator.geolocation.watchPosition(
            pos => {
                state.currentLat = pos.coords.latitude;
                state.currentLng = pos.coords.longitude;
                document.getElementById('gpsStatus').innerHTML = `<i class="fas fa-check-circle"></i> GPS: ±${Math.round(pos.coords.accuracy)}m`;
                if (!marker) {
                    marker = L.marker([state.currentLat, state.currentLng], {
                        icon: L.divIcon({ html: '<i class="fas fa-location-dot" style="color:#dc2626;font-size:22px;"></i>', iconSize: [22, 22] })
                    }).addTo(state.map);
                } else {
                    marker.setLatLng([state.currentLat, state.currentLng]);
                }
            },
            () => document.getElementById('gpsStatus').innerHTML = '<i class="fas fa-exclamation"></i> GPS unavailable',
            { enableHighAccuracy: true }
        );
    }
    
    // Measure tool
    let measuring = false;
    window.startMeasure = () => {
        if (measuring) {
            notify('Measure mode off', 'info');
            measuring = false;
            return;
        }
        measuring = true;
        notify('Click two points on map to measure distance', 'info');
        let pts = [];
        state.map.once('click', e1 => {
            pts.push(e1.latlng);
            state.map.once('click', e2 => {
                pts.push(e2.latlng);
                const dist = turf.distance(turf.point([pts[0].lng, pts[0].lat]), turf.point([pts[1].lng, pts[1].lat]), { units: 'km' });
                notify(`Distance: ${dist.toFixed(3)} km`, 'success');
                measuring = false;
            });
        });
    };

    function bindFormEvents() {
        const photoInput = document.getElementById('photoInput');
        if (photoInput) photoInput.onchange = (e) => handlePhotos(e.target.files);
        renderGallery();
        
        document.getElementById('saveDraftBtn').onclick = async () => {
            const data = collectFormData();
            await saveInspection(data, true);
            notify('Draft saved successfully', 'success');
        };
        
        document.getElementById('finaliseBtn').onclick = async () => {
            const data = collectFormData();
            if (!data.siteName) {
                notify('Site name is required', 'warning');
                return;
            }
            data.status = 'finalised';
            state.isFinalised = true;
            const eco = calculateEcologicalScore(data);
            data.ecologicalScore = eco;
            await saveInspection(data, false);
            await generatePDF(data);
            await deleteInspection(data.id, true);
            notify('Inspection finalised and report generated', 'success');
            closePanel();
            showInspections();
        };
        
        document.getElementById('cancelBtn').onclick = () => closePanel();
        
        document.querySelectorAll('.section-header').forEach(h => {
            h.addEventListener('click', () => {
                h.classList.toggle('collapsed');
                h.nextElementSibling.classList.toggle('collapsed');
            });

        const sliders = ['vegStrataScore', 'habitatComplexity', 'recruitment', 'weedCover', 'nativeRichness', 'canopyHealth', 'hydrology', 'disturbance'];

            if (el) el.oninput = () => {
                const data = collectFormData();
                const eco = calculateEcologicalScore(data);
                const fill = document.querySelector('.health-fill');
                if (fill) fill.style.width = `${eco.conditionScore * 10}%`;
            };
        });

    // ======================= UI NAVIGATION =======================
    async function newInspection() {
        state.currentId = uuid();
        state.currentPhotos = [];
        state.geometry = [];
        state.waypoints = [];
        state.isFinalised = false;
        if (state.drawnItems) state.drawnItems.clearLayers();
        document.getElementById('panelContent').innerHTML = renderForm({ id: state.currentId });
        document.getElementById('panelTitle').innerHTML = 'New Ecological Assessment';
        openPanel();
        bindFormEvents();
    }
    
    async function loadInspection(insp, isDraft = false) {
        state.currentId = insp.id;
        state.currentPhotos = insp.photos || [];
        state.geometry = insp.geometry || [];
        state.waypoints = insp.waypoints || [];
        state.isFinalised = insp.status === 'finalised';
        if (state.drawnItems && state.geometry.length) {
            state.geometry.forEach(g => { try { L.geoJSON(g).addTo(state.drawnItems); } catch (e) { } });
        }
        document.getElementById('panelContent').innerHTML = renderForm(insp);
        document.getElementById('panelTitle').innerHTML = isDraft ? 'Edit Draft' : 'View Inspection';
        openPanel();
        bindFormEvents();
        renderGallery();
    }

    function exportGeoJSON() {
        const features = [...state.geometry, ...state.waypoints.map(w => turf.point([w.lng, w.lat], { label: w.label, type: 'waypoint' }))];
        const fc = { type: 'FeatureCollection', features };
        const blob = new Blob([JSON.stringify(fc, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `cem_export_${Date.now()}.geojson`;
        a.click();
        URL.revokeObjectURL(blob.url);
        notify('GeoJSON exported', 'success');
    }
    
    function openPanel() { document.getElementById('panel').classList.add('open'); }
    function closePanel() { document.getElementById('panel').classList.remove('open'); }
    
    function bindEvents() {
        document.getElementById('newInspectionBtn').onclick = () => newInspection();
        document.getElementById('listInspectionsBtn').onclick = () => showInspections();
        document.getElementById('closePanelBtn').onclick = () => closePanel();
        document.getElementById('clearMapBtn').onclick = () => { state.drawnItems?.clearLayers(); state.geometry = []; state.waypoints = []; notify('Map cleared', 'info'); };
        document.getElementById('exportGeoJsonBtn').onclick = () => exportGeoJSON();
        document.getElementById('measureBtn').onclick = () => window.startMeasure();
        document.getElementById('toggleSatBtn').onclick = () => document.getElementById('toggleSatMap')?.click();
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.onclick = () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                const view = item.dataset.view;
                if (view === 'dashboard') showDashboard();
                if (view === 'inspections') showInspections();
                if (view === 'new') newInspection();
                if (view === 'mapview') closePanel();
                if (view === 'drafts') showDrafts();
            };
        });
    }
    
    async function init() {
        await initDB();
        initMap();
        initGPS();
        bindEvents();
        notify('CEM Site Inspector Pro v5.1 | Ready for field assessments', 'success');
    }
    
    init();
})();
</script>
</body>
</html>
